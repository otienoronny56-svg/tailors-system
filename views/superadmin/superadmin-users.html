    <style>
        

        

        

        .main-content {
            
            
            flex-grow: 1;
            min-width: 0;
            width: calc(100% - 260px) !important;
            box-sizing: border-box;
            padding: 20px 30px !important;
        }

        .main-content h1 {
            color: var(--brand-gold) !important;
            font-family: 'Playfair Display', serif;
            font-size: 2.2em;
            font-weight: 700;
        }

        /* Form Container glassmorphism */
        .order-form-container {
            background: var(--card-bg) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 16px !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4) !important;
            
            padding: 30px !important;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .order-form-container h2 {
            color: var(--brand-gold) !important;
            font-family: 'Playfair Display', serif;
            font-size: 1.6em;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Inputs & Select Elements */
        input[type="text"], input[type="email"], input[type="password"], select {
            background: rgba(6, 12, 24, 0.6) !important;
            border: 1px solid var(--glass-border) !important;
            
            padding: 12px 15px !important;
            border-radius: 8px !important;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus, select:focus {
            outline: none;
            border-color: var(--brand-gold) !important;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }

        select option {
            
            
        }

        /* Form Buttons */
        .submit-btn {
            background: var(--brand-gold) !important;
            color: var(--brand-navy) !important;
            padding: 14px !important;
            font-weight: 700 !important;
            border: none !important;
            border-radius: 8px !important;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            background: var(--brand-gold-hover) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        }

        /* Note Callout */
        .info-note {
            background: rgba(212, 175, 55, 0.05) !important;
            border-left: 4px solid var(--brand-gold) !important;
            padding: 20px !important;
            border-radius: 8px !important;
            font-size: 0.95em !important;
            color: var(--brand-slate) !important;
            max-width: 600px;
            box-sizing: border-box;
            line-height: 1.6;
        }

        .info-note strong {
            
        }

        /* MOBILE HAMBURGER MENU & RESPONSIVENESS */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: var(--brand-navy);
            color: var(--brand-gold);
            border: 1px solid var(--brand-gold);
            border-radius: 4px;
            padding: 10px;
            font-size: 1.2em;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                position: fixed;
                z-index: 999;
                height: 100%;
                width: 260px;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                width: 100% !important;
                padding: 15px !important;
            }
            .main-content h1 {
                font-size: 1.6em !important;
            }
            .main-content > header > div {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 15px;
            }
            .main-content > header > div > div:first-child {
                padding-left: 45px;
            }
            .main-content > header > h1 {
                padding-left: 45px;
            }
        }
    </style>
    <link rel="manifest" href="../../manifest.json">

    


    <!-- Sleek UI Override for Superadmin -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body, .main-content h1, .sidebar-logo, h2, h3, h4, .stat-card h3 {
            font-family: 'Inter', sans-serif !important;
        }

        /* Sleek Sidebar */
        .sidebar {
            background: #ffffff !important;
            border-right: 1px solid #f1f5f9 !important;
        }
        .dark-mode .sidebar {
            background: #0f172a !important;
            border-right: 1px solid #1e293b !important;
        }

        .sidebar-logo {
            font-size: 1.2em !important;
            color: #0f172a !important;
            letter-spacing: 0px !important;
        }
        .dark-mode .sidebar-logo, .dark-mode .dark-mode-text { color: #f8fafc !important; }
        
        .sidebar-subtitle { display: none !important; }
        
        .sidebar nav a {
            color: #64748b !important;
            font-size: 0.95em !important;
            padding: 12px 15px !important;
            margin: 4px 15px !important;
            border-radius: 8px !important;
            font-weight: 500 !important;
        }
        .sidebar nav a:hover {
            background: #f8fafc !important;
            color: #3b82f6 !important;
        }
        .sidebar nav a.active {
            background: rgba(59, 130, 246, 0.1) !important;
            color: #3b82f6 !important;
            border: none !important;
            font-weight: 600 !important;
        }
        
        .dark-mode .sidebar nav a { color: #94a3b8 !important; }
        .dark-mode .sidebar nav a:hover { background: #1e293b !important; color: #60a5fa !important; }
        .dark-mode .sidebar nav a.active { background: rgba(96, 165, 250, 0.1) !important; color: #60a5fa !important; }

        /* Main Content Spacing */
        .dashboard-container {
            background: #f8fafc !important;
        }
        .dark-mode .dashboard-container { background: #0b1120 !important; }
        
        .main-content {
            padding: 30px 40px !important;
        }
        
        .main-content h1 {
            font-size: 1.5em !important;
            color: #0f172a !important;
            font-weight: 600 !important;
        }
        .dark-mode .main-content h1 { color: #f8fafc !important; }

        /* Sleek Cards */
        .stat-card, .dashboard-section, .order-list, .order-form-container {
            background: #ffffff !important;
            border-radius: 16px !important;
            border: 1px solid #f1f5f9 !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02) !important;
            padding: 24px !important;
        }
        .dark-mode .stat-card, .dark-mode .dashboard-section, .dark-mode .order-list, .dark-mode .order-form-container {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2) !important;
        }

        .stat-card h3 {
            font-size: 0.9em !important;
            color: #64748b !important;
            font-weight: 500 !important;
        }
        
        /* Table Styling */
        table th {
            font-family: 'Inter', sans-serif !important;
            color: #64748b !important;
            font-size: 0.8em !important;
            font-weight: 500 !important;
            background: transparent !important;
            border-bottom: 1px solid #f1f5f9 !important;
        }
        .dark-mode table th { border-bottom: 1px solid #334155 !important; color: #94a3b8 !important; }
        
        table td {
            font-size: 0.9em !important;
            border-bottom: 1px solid #f8fafc !important;
            color: #334155 !important;
        }
        .dark-mode table td { border-bottom: 1px solid #1e293b !important; color: #cbd5e1 !important; }
        
        /* Inputs & Buttons */
        .small-btn, .submit-btn {
            border-radius: 8px !important;
            font-family: 'Inter', sans-serif !important;
            font-weight: 500 !important;
            font-size: 0.85em !important;
            padding: 8px 16px !important;
            box-shadow: none !important;
        }
    </style>

</head>
<body>
    <!-- Dark Mode Initializer -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }
    </script>
    <div class="mobile-menu-btn" id="mobile-menu-btn">
        <i class="fas fa-bars"></i>
    </div>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <h1 class="sidebar-logo">STITCH & STYLES KENYA</h1>
                    <span class="sidebar-subtitle">SAAS CONTROL</span>
                </div>
            </div>

            <p id="user-info">Logged in as: Owner</p>
                        <nav></nav>
            <script>
                if (typeof window.toggleSidebarDropdown !== 'function') {
                    window.toggleSidebarDropdown = function(button) {
                        const event = window.event || (arguments.length > 1 ? arguments[1] : null);
                        if (event) {
                            event.alreadyHandledDropdown = true;
                        }
                        const dropdown = button.closest('.sidebar-dropdown');
                        if (dropdown) {
                            dropdown.classList.toggle('open');
                        }
                    };
                }
            </script>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 30px;">
                <h1>Admin User Provisioning</h1>
            </header>

            <section class="order-form-container">
                <h2>Create Tenant Admin (Owner)</h2>
                <form id="create-admin-form">
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                        <div>
                            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--brand-slate);">Full Name</label>
                            <input type="text" id="admin-fullname" placeholder="John Doe" required>
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--brand-slate);">Email Address</label>
                            <input type="email" id="admin-email" placeholder="admin@shop.com" required>
                        </div>
                    </div>
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                        <div>
                            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--brand-slate);">Initial Password</label>
                            <input type="password" id="admin-password" placeholder="Min 6 characters" required>
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--brand-slate);">Assign to Organization</label>
                            <select id="admin-org-select" required>
                                <option value="">Select Organization...</option>
                                <!-- Orgs will be loaded by JS -->
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="create-admin-btn">
                        <i class="fas fa-user-plus"></i> Create Admin Account
                    </button>
                    <div id="admin-message" style="margin-top: 15px; text-align: center; font-weight: 500;"></div>
                </form>
            </section>

            <div class="info-note">
                <i class="fas fa-info-circle" style="color: var(--brand-gold); margin-right: 8px;"></i>
                <strong>Note:</strong> Creating an account here uses the Supabase Admin API. The user will be created and automatically linked to the selected organization with the <strong>Owner</strong> role.
            </div>
        </main>
    </div>
