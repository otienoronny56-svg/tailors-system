<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Platform Blogs | STITCH & STYLES KENYA</title>
    <link rel="icon" type="image/png" href="../../logo.jpeg">
    <link rel="stylesheet" href="../../styles.css">
    <script src="/js/lib/supabase.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .blog-list { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            overflow-x: auto; 
        }
        .dark-mode .blog-list { 
            background: #1e293b; 
            border: 1px solid #334155; 
        }
        .blog-list table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 600px;
        }
        .blog-list th, .blog-list td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #e2e8f0; 
        }
        .dark-mode .blog-list th, .dark-mode .blog-list td {
            border-bottom: 1px solid #334155; 
            color: #f8fafc;
        }
        .blog-list th { color: var(--brand-navy); }
        .dark-mode .blog-list th { color: var(--brand-gold); }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .status-published { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .status-draft { background: #f1f5f9; color: #475569; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 600px; 
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        #blog-form {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }
        .dark-mode .modal-content { background: #1e293b; color: white; border: 1px solid #334155; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box;
        }
        .dark-mode .form-group input, .dark-mode .form-group textarea, .dark-mode .form-group select {
            background: #0f172a;
            color: white;
            border-color: #334155;
        }
        .action-btn { margin-right: 5px; cursor: pointer; padding: 6px 12px; border-radius: 6px; border: none; font-size: 0.85em; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 5px;}
        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; }
        .btn-edit { background: #3b82f6; color: white; }
        
        .dashboard-container {
            display: flex;
        }
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                position: fixed;
                z-index: 999;
                height: 100%;
                width: 260px;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                width: 100% !important;
                padding: 15px !important;
            }
            .main-content h1 {
                font-size: 1.6em !important;
            }
            .main-content > header > div {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 15px;
            }
            .main-content > header > div > div:first-child {
                padding-left: 45px;
            }
            .main-content > header > h1 {
                padding-left: 45px;
            }
            .main-content > header > div > button {
                margin-left: 45px;
            }
            .blog-list { 
                padding: 10px; 
            }
        }
    </style>

    <!-- Sleek UI Override for Superadmin -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body, .main-content h1, .sidebar-logo, h2, h3, h4, .stat-card h3 {
            font-family: 'Inter', sans-serif !important;
        }

        /* Sleek Sidebar */
        .sidebar {
            background: #ffffff !important;
            border-right: 1px solid #f1f5f9 !important;
        }
        .dark-mode .sidebar {
            background: #0f172a !important;
            border-right: 1px solid #1e293b !important;
        }

        .sidebar-logo {
            font-size: 1.2em !important;
            color: #0f172a !important;
            letter-spacing: 0px !important;
        }
        .dark-mode .sidebar-logo { color: #f8fafc !important; }
        
        .sidebar nav a {
            color: #64748b !important;
            font-size: 0.95em !important;
            padding: 12px 15px !important;
            margin: 4px 15px !important;
            border-radius: 8px !important;
            font-weight: 500 !important;
        }
        .sidebar nav a:hover {
            background: #f8fafc !important;
            color: #3b82f6 !important;
        }
        .sidebar nav a.active {
            background: rgba(59, 130, 246, 0.1) !important;
            color: #3b82f6 !important;
            border: none !important;
            font-weight: 600 !important;
        }
        
        .dark-mode .sidebar nav a { color: #94a3b8 !important; }
        .dark-mode .sidebar nav a:hover { background: #1e293b !important; color: #60a5fa !important; }
        .dark-mode .sidebar nav a.active { background: rgba(96, 165, 250, 0.1) !important; color: #60a5fa !important; }

        /* Main Content Spacing */
        .dashboard-container {
            background: #f8fafc !important;
        }
        .dark-mode .dashboard-container { background: #0b1120 !important; }
        
        .main-content {
            padding: 0 !important;
        }
        
        .main-content h1 {
            font-size: 1.5em !important;
            color: #0f172a !important;
            font-weight: 600 !important;
        }
        .dark-mode .main-content h1 { color: #f8fafc !important; }

        /* Sleek Cards */
        .stat-card, .dashboard-section, .order-list, .order-form-container, .blog-list {
            background: #ffffff !important;
            border-radius: 16px !important;
            border: 1px solid #f1f5f9 !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
            padding: 20px !important;
        }
        .dark-mode .stat-card, .dark-mode .dashboard-section, .dark-mode .order-list, .dark-mode .order-form-container, .dark-mode .blog-list {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2) !important;
        }

        /* Inputs & Buttons */
        .small-btn, .submit-btn {
            border-radius: 8px !important;
            font-family: 'Inter', sans-serif !important;
            font-weight: 500 !important;
            font-size: 0.85em !important;
            padding: 8px 16px !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }
    </script>
    <div class="mobile-menu-btn" id="mobile-menu-btn">
        <i class="fas fa-bars"></i>
    </div>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <h1 class="sidebar-logo">STITCH & STYLES KENYA</h1>
                    <span class="sidebar-subtitle">SAAS CONTROL</span>
                </div>
            </div>
            <p id="user-info" style="padding: 10px 15px; font-size: 0.8em; color: #64748b;">Loading session...</p>
            <nav></nav>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 20px; padding: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                    <div>
                        <h1 style="margin: 0; font-size: 1.5em; color: var(--brand-navy);" class="dark-mode-text">Platform Blogs</h1>
                        <p style="color: #64748b; font-size: 0.9em; margin-top: 5px;">Review, approve, and write blog posts for the entire platform.</p>
                    </div>
                    <button onclick="openModal()" class="small-btn" style="background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px;"><i class="fas fa-plus"></i> Write New Post</button>
                </div>
            </header>

            <div style="padding: 0 20px 20px 20px;">
                <div class="blog-list">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="blog-tbody">
                            <tr><td colspan="4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="blog-modal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2 style="margin:0;" id="modal-title">Write a Blog Post</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size: 1.5em; cursor: pointer; color: inherit;">&times;</button>
            </div>
            <form id="blog-form" onsubmit="event.preventDefault(); savePost();">
                <input type="hidden" id="edit-post-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="blog-title" required placeholder="e.g. 5 Ways to Style African Prints">
                </div>
                <div class="form-group">
                    <label>Content (HTML supported)</label>
                    <textarea id="blog-content" rows="6" required placeholder="<p>Write your article here...</p>"></textarea>
                </div>
                <div class="form-group">
                    <label>Action</label>
                    <select id="blog-action">
                        <option value="draft">Save as Draft</option>
                        <option value="published">Publish Immediately</option>
                    </select>
                </div>
                <button type="submit" style="background: var(--brand-navy); color: var(--brand-gold); width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Save Post</button>
            </form>
        </div>
    </div>

    <script src="../../js/core/config.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/ui/theme.js"></script>
    <script src="../../js/core/globals.js"></script>
    <script src="../../js/core/init.js"></script>
    <script src="../../js/core/auth.js"></script>
    <script src="../../js/ui/sidebar.js"></script>
    <script src="../../app.js"></script>
    <script>
        const client = window.supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
        });

        async function fetchBlogs() {
            if (!USER_PROFILE) return;
            const { data, error } = await client.from('blogs')
                .select('*')
                .order('created_at', { ascending: false });
            
            const tbody = document.getElementById('blog-tbody');
            if (error || !data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No blogs found.</td></tr>';
                return;
            }

            window.CURRENT_BLOGS = data;
            tbody.innerHTML = '';
            data.forEach(p => {
                let actionHtml = `<button class="action-btn btn-edit" onclick="editPost('${p.id}')"><i class="fas fa-edit"></i> Edit</button>`;
                
                if(p.status === 'pending') {
                    actionHtml += `
                        <button class="action-btn btn-approve" onclick="updateStatus('${p.id}', 'published')"><i class="fas fa-check"></i> Approve</button>
                        <button class="action-btn btn-reject" onclick="updateStatus('${p.id}', 'rejected')"><i class="fas fa-times"></i> Reject</button>
                    `;
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: 500;">${p.title}</td>
                        <td><span class="status-badge status-${p.status}">${p.status.toUpperCase()}</span></td>
                        <td>${new Date(p.created_at).toLocaleDateString()}</td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
            });
        }

        function openModal() { 
            document.getElementById('blog-modal').style.display = 'flex'; 
            document.getElementById('edit-post-id').value = '';
            document.getElementById('blog-form').reset();
            document.getElementById('modal-title').innerText = 'Write a Blog Post';
        }
        function closeModal() { document.getElementById('blog-modal').style.display = 'none'; }

        function editPost(id) {
            const p = window.CURRENT_BLOGS.find(b => b.id === id);
            if (!p) return;
            document.getElementById('edit-post-id').value = p.id;
            document.getElementById('blog-title').value = p.title;
            document.getElementById('blog-content').value = p.content || '';
            
            const actionSelect = document.getElementById('blog-action');
            if (actionSelect) {
                // If the post is pending/rejected, just keep the default 'draft' or add options. 
                // We'll set it to published if it was published, otherwise draft.
                actionSelect.value = p.status === 'published' ? 'published' : 'draft';
            }
            
            document.getElementById('modal-title').innerText = 'Edit Blog Post';
            document.getElementById('blog-modal').style.display = 'flex';
        }

        async function savePost() {
            if(!USER_PROFILE) return alert("Not logged in");
            
            const title = document.getElementById('blog-title').value;
            const content = document.getElementById('blog-content').value;
            const status = document.getElementById('blog-action').value;
            const postId = document.getElementById('edit-post-id').value;

            // Generate a slug
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '') + '-' + Date.now().toString().slice(-4);

            const payload = {
                author_id: USER_PROFILE.id,
                title, content, slug, status
            };
            if (USER_PROFILE.organization_id) {
                payload.organization_id = USER_PROFILE.organization_id;
            }

            let res;
            if(postId) {
                res = await client.from('blogs').update(payload).eq('id', postId);
            } else {
                res = await client.from('blogs').insert([payload]);
            }

            if (res.error) alert("Error saving: " + res.error.message);
            else {
                closeModal();
                fetchBlogs();
            }
        }

        async function updateStatus(id, newStatus) {
            if(!confirm("Are you sure you want to " + newStatus + " this post?")) return;
            const { error } = await client.from('blogs').update({ status: newStatus }).eq('id', id);
            if(error) alert("Error updating: " + error.message);
            else fetchBlogs();
        }

    </script>
</body>
</html>
