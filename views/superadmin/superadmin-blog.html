<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Blog Approvals</title>
    <link rel="icon" type="image/png" href="../../logo.jpeg">
    <link rel="stylesheet" href="../../styles.css">
    <script src="/js/lib/supabase.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #060c18; color: white; }
        .dashboard-container { background: transparent; }
        .main-content { padding: 20px 40px; }
        .blog-list { background: rgba(17, 34, 64, 0.75); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 12px; padding: 20px; }
        .blog-list table { width: 100%; border-collapse: collapse; }
        .blog-list th, .blog-list td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .blog-list th { color: #D4AF37; text-transform: uppercase; }
        .btn-approve { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-reject { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .status-pending { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .status-published { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    </style>

    <!-- Sleek UI Override for Superadmin -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body, .main-content h1, .sidebar-logo, h2, h3, h4, .stat-card h3 {
            font-family: 'Inter', sans-serif !important;
        }

        /* Sleek Sidebar */
        .sidebar {
            background: #ffffff !important;
            border-right: 1px solid #f1f5f9 !important;
        }
        .dark-mode .sidebar {
            background: #0f172a !important;
            border-right: 1px solid #1e293b !important;
        }

        .sidebar-logo {
            font-size: 1.2em !important;
            color: #0f172a !important;
            letter-spacing: 0px !important;
        }
        .dark-mode .sidebar-logo { color: #f8fafc !important; }
        
        .sidebar-subtitle { display: none !important; }
        
        .sidebar nav a {
            color: #64748b !important;
            font-size: 0.95em !important;
            padding: 12px 15px !important;
            margin: 4px 15px !important;
            border-radius: 8px !important;
            font-weight: 500 !important;
        }
        .sidebar nav a:hover {
            background: #f8fafc !important;
            color: #3b82f6 !important;
        }
        .sidebar nav a.active {
            background: rgba(59, 130, 246, 0.1) !important;
            color: #3b82f6 !important;
            border: none !important;
            font-weight: 600 !important;
        }
        
        .dark-mode .sidebar nav a { color: #94a3b8 !important; }
        .dark-mode .sidebar nav a:hover { background: #1e293b !important; color: #60a5fa !important; }
        .dark-mode .sidebar nav a.active { background: rgba(96, 165, 250, 0.1) !important; color: #60a5fa !important; }

        #user-info { display: none !important; } /* Remove bulky logged in text */

        /* Main Content Spacing */
        .dashboard-container {
            background: #f8fafc !important;
        }
        .dark-mode .dashboard-container { background: #0b1120 !important; }
        
        .main-content {
            padding: 30px 40px !important;
        }
        
        .main-content h1 {
            font-size: 1.5em !important;
            color: #0f172a !important;
            font-weight: 600 !important;
        }
        .dark-mode .main-content h1 { color: #f8fafc !important; }

        /* Sleek Cards */
        .stat-card, .dashboard-section, .order-list, .order-form-container {
            background: #ffffff !important;
            border-radius: 16px !important;
            border: 1px solid #f1f5f9 !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02) !important;
            padding: 24px !important;
        }
        .dark-mode .stat-card, .dark-mode .dashboard-section, .dark-mode .order-list, .dark-mode .order-form-container {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2) !important;
        }

        .stat-card h3 {
            font-size: 0.9em !important;
            color: #64748b !important;
            font-weight: 500 !important;
        }
        .stat-card p.stat-value {
            font-size: 2.2em !important;
            color: #0f172a !important;
            font-weight: 600 !important;
            margin-top: 10px !important;
        }
        .dark-mode .stat-card p.stat-value { color: #f8fafc !important; }
        
        /* Badges */
        .badge-premium, .badge-active, .badge-warning {
            border-radius: 20px !important;
            font-size: 0.75em !important;
            padding: 4px 10px !important;
            text-transform: none !important;
            font-weight: 500 !important;
            border: none !important;
        }
        
        /* Table Styling */
        table th {
            font-family: 'Inter', sans-serif !important;
            color: #64748b !important;
            font-size: 0.8em !important;
            font-weight: 500 !important;
            background: transparent !important;
            border-bottom: 1px solid #f1f5f9 !important;
        }
        .dark-mode table th { border-bottom: 1px solid #334155 !important; color: #94a3b8 !important; }
        
        table td {
            font-size: 0.9em !important;
            border-bottom: 1px solid #f8fafc !important;
            color: #334155 !important;
        }
        .dark-mode table td { border-bottom: 1px solid #1e293b !important; color: #cbd5e1 !important; }
        
        /* Inputs & Buttons */
        .small-btn, .submit-btn {
            border-radius: 8px !important;
            font-family: 'Inter', sans-serif !important;
            font-weight: 500 !important;
            font-size: 0.85em !important;
            padding: 8px 16px !important;
            box-shadow: none !important;
        }
    </style>

</head>
<body>
    <!-- Dark Mode Initializer -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }
    </script>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <h1 class="sidebar-logo">SAAS CONTROL</h1>
                </div>
            </div>
            <nav></nav>
        </aside>

        <main class="main-content">
            <h1 style="color: #D4AF37; font-family: 'Playfair Display', serif;">Blog Approvals</h1>
            <p style="color: #8892b0; margin-bottom: 20px;">Review and approve articles submitted by tailors.</p>

            <div class="blog-list">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Created Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="blog-tbody">
                        <tr><td colspan="4">Loading pending blogs...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../../js/core/config.js"></script>
    <script>
        const client = window.supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

        async function fetchPendingBlogs() {
            // Admin fetches all pending and published just to see
            const { data, error } = await client.from('blogs').select('*').in('status', ['pending', 'published']).order('created_at', { ascending: false });
            
            const tbody = document.getElementById('blog-tbody');
            if(error || !data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No blogs to review.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.forEach(p => {
                const date = new Date(p.created_at).toLocaleDateString();
                const tr = document.createElement('tr');
                
                let actions = '';
                if(p.status === 'pending') {
                    actions = `
                        <button class="btn-approve" onclick="updateStatus('${p.id}', 'published')">Approve</button>
                        <button class="btn-reject" onclick="updateStatus('${p.id}', 'rejected')">Reject</button>
                    `;
                } else if (p.status === 'published') {
                     actions = `<button class="btn-reject" onclick="updateStatus('${p.id}', 'draft')">Unpublish</button>`;
                }

                tr.innerHTML = `
                    <td><strong>${p.title}</strong></td>
                    <td><span class="status-badge status-${p.status}">${p.status.toUpperCase()}</span></td>
                    <td>${date}</td>
                    <td style="display:flex; gap:10px;">${actions}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateStatus(id, newStatus) {
            const { error } = await client.from('blogs').update({ status: newStatus }).eq('id', id);
            if(error) alert('Error: ' + error.message);
            else fetchPendingBlogs();
        }

        document.addEventListener('DOMContentLoaded', fetchPendingBlogs);
    </script>
</body>
</html>
