<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TKKW51QFZ5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-TKKW51QFZ5');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Your Order | Tailors Marketplace</title>
    <link rel="icon" type="image/png" href="../../logo.jpeg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="/js/lib/supabase.min.js"></script>
    <script src="../../js/core/config.js?v=1781824528054"></script>

    <style>
        :root {
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --brand-gold: #eab308;
            --brand-gold-hover: #ca8a04;
            --brand-white: #fafafa;
            --brand-slate: #a1a1aa;
            --success-color: #10b981;
            --brand-glow: rgba(234, 179, 8, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e 0%, var(--bg-dark) 50%, var(--bg-dark) 100%);
            color: var(--brand-white);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Nav Bar */
        nav {
            width: 100%;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            font-weight: 700;
            color: var(--brand-white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo i {
            color: var(--brand-gold);
        }

        .nav-link {
            color: var(--brand-slate);
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 500;
            transition: color 0.3s;
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(255,255,255,0.02);
        }

        .nav-link:hover {
            color: var(--brand-gold);
            border-color: var(--brand-gold);
            background: var(--brand-glow);
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        /* Abstract glowing orb in background */
        .workspace::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            height: 60vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, var(--brand-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .tracking-card {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            z-index: 1;
            max-height: 100%;
            min-height: 0;
            overflow: hidden; /* Hide outer scrollbar */
        }

        .card-header {
            padding: 30px 30px 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }

        .order-title-group {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .garment-name {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: var(--brand-white);
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 5px;
        }

        .customer-name {
            color: var(--brand-slate);
            font-size: 0.9em;
            font-weight: 400;
        }

        .finance-badge {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 15px;
            text-align: right;
        }

        .total-price {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--brand-gold);
        }

        .paid-amount {
            font-size: 0.8em;
            color: var(--success-color);
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
        }

        .dates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
        }

        .date-box {
            display: flex;
            flex-direction: column;
        }

        .date-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-slate);
            margin-bottom: 3px;
        }

        .date-value {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--brand-white);
        }

        .card-body {
            padding: 30px;
            padding-bottom: 50px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .card-body::-webkit-scrollbar {
            width: 4px;
        }

        .card-body::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        /* Elegant Timeline */
        .timeline {
            position: relative;
            padding-left: 25px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, var(--brand-gold) 0%, rgba(255,255,255,0.1) 100%);
            /* dynamically updated via JS based on progress */
        }

        .timeline-step {
            position: relative;
            padding-bottom: 35px;
        }

        .timeline-step:last-child {
            padding-bottom: 0;
        }

        .step-indicator {
            position: absolute;
            left: -25px;
            top: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.4s ease;
            z-index: 2;
        }

        .step-content {
            padding-left: 15px;
            transform: translateY(-4px);
        }

        .step-title {
            font-size: 1.05em;
            font-weight: 600;
            color: var(--brand-slate);
            margin-bottom: 4px;
            transition: color 0.3s;
        }

        .step-desc {
            font-size: 0.85em;
            color: rgba(161, 161, 170, 0.6);
            line-height: 1.4;
        }

        /* Timeline States */
        .timeline-step.completed .step-indicator {
            background: var(--success-color);
            border-color: var(--success-color);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        .timeline-step.completed .step-title {
            color: var(--brand-white);
        }

        .timeline-step.active .step-indicator {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.5);
            transform: scale(1.3);
        }

        .timeline-step.active .step-title {
            color: var(--brand-gold);
        }

        .timeline-step.active .step-desc {
            color: var(--brand-slate);
        }

        /* Loading & Error */
        .state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--brand-gold);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-icon {
            font-size: 3em;
            color: #ef4444;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(239,68,68,0.4);
        }

        @media (max-width: 600px) {
            .order-title-group {
                flex-direction: column;
                gap: 15px;
            }
            .finance-badge {
                text-align: left;
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .paid-amount { margin-top: 0; }
            .tracking-card { border-radius: 16px; max-height: 90vh; }
            .card-header { padding: 20px; }
            .card-body { padding: 20px; padding-bottom: 60px; }
            .nav-logo span { display: none; } /* Show icon only on small screens */
        }
    </style>
    <link rel="manifest" href="../../manifest.json">
</head>
<body>
    <!-- Dark Mode Initializer -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }
    </script>

    <!-- Nav with Ad Link -->
    <nav>
        <a href="../../index.html" class="nav-logo">
            <i class="fas fa-cut"></i> <span>Tailors Marketplace</span>
        </a>
        <a href="../../index.html" class="nav-link">Explore Fashion Marketplace <i class="fas fa-arrow-right" style="margin-left: 5px;"></i></a>
    </nav>

    <!-- Main Content Area -->
    <div class="workspace">
        <div class="tracking-card" id="tracking-container">
            <div class="state-container">
                <div class="loader"></div>
                <h3 style="font-weight: 500; color: var(--brand-slate);">Locating your order...</h3>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

        const STATUS_MAP = {
            1: { title: "Order Assigned", desc: "Your order has been officially registered and assigned to a tailor." },
            2: { title: "In Progress", desc: "Your garment is actively being crafted." },
            3: { title: "Quality Check", desc: "Final inspections and finishing touches are underway." },
            4: { title: "Ready for Fitting", desc: "Your garment is ready for fitting." },
            5: { title: "Ready for Collection", desc: "Your tailored garment is complete and ready!" },
            6: { title: "Collected", desc: "The garment has been handed over to you." },
            7: { title: "Closed", desc: "Order finalized." }
        };

        const STATUS_FLOW = [1, 2, 3, 4, 5, 6];

        async function initTracking() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('id');

            if (!orderId) {
                showError("Invalid Tracking Link", "No order ID was found in the URL.");
                return;
            }

            try {
                const { data, error } = await supabaseClient.rpc('get_tracking_order', { tracking_id: orderId });

                if (error) throw error;
                if (!data || data.length === 0) {
                    showError("Order Not Found", "We couldn't find an order with this tracking ID.");
                    return;
                }

                renderOrder(data[0]);

            } catch (err) {
                console.error("Tracking Error:", err);
                showError("System Error", "Unable to load the order details right now.");
            }
        }

        function showError(title, message) {
            document.getElementById('tracking-container').innerHTML = `
                <div class="state-container">
                    <i class="fas fa-exclamation-circle error-icon"></i>
                    <h2 style="margin-bottom: 8px; color: var(--brand-white); font-family: 'Playfair Display', serif;">${title}</h2>
                    <p style="color: var(--brand-slate);">${message}</p>
                </div>
            `;
        }

        function renderOrder(order) {
            const currentStatus = order.status;
            
            const dueDateStr = order.due_date 
                ? new Date(order.due_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) 
                : 'TBD';
            
            const createdStr = order.created_at 
                ? new Date(order.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
                : '—';

            let timelineHtml = '<div class="timeline">';
            
            let activeIndex = 0;

            for (let i = 0; i < STATUS_FLOW.length; i++) {
                let step = STATUS_FLOW[i];
                let stateClass = '';
                
                if (currentStatus === 7) { 
                    statusMessage = "🎉 Order successfully closed!";
                    stateClass = 'completed';
                    activeIndex = STATUS_FLOW.length;
                } else if (step < currentStatus) {
                    stateClass = 'completed';
                    activeIndex = i + 1;
                } else if (step === currentStatus) {
                    stateClass = 'active';
                    activeIndex = i;
                }

                timelineHtml += `
                    <div class="timeline-step ${stateClass}">
                        <div class="step-indicator"></div>
                        <div class="step-content">
                            <div class="step-title">${STATUS_MAP[step].title}</div>
                            <div class="step-desc">${STATUS_MAP[step].desc}</div>
                        </div>
                    </div>
                `;
            }
            timelineHtml += '</div>';

            const progressPercent = currentStatus === 7 ? 100 : (activeIndex / (STATUS_FLOW.length - 1)) * 100;

            document.getElementById('tracking-container').innerHTML = `
                <div class="card-header">
                    <div class="order-title-group">
                        <div>
                            <div class="garment-name">${order.garment_type || 'Custom Garment'}</div>
                            <div class="customer-name">Ordered by ${order.customer_name}</div>
                        </div>
                        <div class="finance-badge">
                            <div class="total-price">Ksh ${parseFloat(order.price || 0).toLocaleString()}</div>
                            <div class="paid-amount"><i class="fas fa-check-circle"></i> Paid: Ksh ${parseFloat(order.amount_paid || 0).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="dates-grid">
                        <div class="date-box">
                            <span class="date-label">Order Date</span>
                            <span class="date-value">${createdStr}</span>
                        </div>
                        <div class="date-box">
                            <span class="date-label">Expected Completion</span>
                            <span class="date-value" style="color: var(--brand-gold);">${dueDateStr}</span>
                        </div>
                    </div>
                </div>
                
                <div class="card-body">
                    <style>
                        .timeline::before {
                            background: linear-gradient(to bottom, var(--brand-gold) ${progressPercent}%, rgba(255,255,255,0.05) ${progressPercent}%);
                        }
                    </style>
                    ${timelineHtml}
                </div>
            `;
        }

        window.onload = initTracking;
    </script>
</body>
</html>
