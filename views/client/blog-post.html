<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TKKW51QFZ5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TKKW51QFZ5');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | Stitch & Styles Kenya</title>
    <!-- Dynamic SEO tags will be injected via JS -->
    <link rel="icon" type="image/png" href="../../logo.jpeg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="/js/lib/supabase.min.js"></script>
    <script src="/js/core/config.js"></script>

    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            --bg-deep: #030712;
            --bg-card: rgba(17, 24, 39, 0.7);
            --gold: #d4af37;
            --gold-border: rgba(212, 175, 55, 0.25);
            --gold-glow: rgba(212, 175, 55, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-slate: #d1d5db;
            --border-glass: rgba(255, 255, 255, 0.08);
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --bg-header: rgba(3, 7, 18, 0.9);
            --meta-pill-bg: rgba(255, 255, 255, 0.05);
            --article-title-color: #fff;
            --share-icon-color: #fff;
        }

        [data-theme="light"] {
            --bg-deep: #f5f5f0;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --text-slate: #374151;
            --border-glass: rgba(0, 0, 0, 0.08);
            --gold-glow: rgba(212, 175, 55, 0.1);
            --meta-pill-bg: rgba(0, 0, 0, 0.04);
            --article-title-color: #111827;
            --share-icon-color: #374151;
        }

        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background-color: var(--bg-deep); color: var(--text-main); line-height: 1.8; font-size: 1.1em; transition: background-color 0.3s, color 0.3s; }

        /* ===== HEADER ===== */
        header { position: fixed; top: 0; left: 0; width: 100%; padding: 14px 8%; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .logo-group { display: flex; flex-direction: row; align-items: center; gap: 14px; text-decoration: none; }
        .logo-img-wrap { width: 48px; height: 48px; border-radius: 10px; overflow: hidden; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.25); flex-shrink: 0; }
        .logo-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
        .logo-text-wrap { display: flex; flex-direction: column; }
        .logo-text { font-family: var(--font-display); font-weight: 700; font-size: 1.25em; color: var(--gold); letter-spacing: 0.5px; line-height: 1.1; margin-bottom: 2px; }
        .logo-sub { font-size: 0.5em; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        nav { display: flex; align-items: center; gap: 32px; }
        .nav-links { display: flex; align-items: center; gap: 28px; }
        .nav-links a { color: var(--text-slate); text-decoration: none; font-weight: 500; font-size: 0.92em; transition: var(--transition-smooth); position: relative; padding: 4px 0; }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--gold); transition: var(--transition-smooth); }
        .nav-links a:hover { color: var(--gold); }
        .nav-links a:hover::after { width: 100%; }
        .theme-toggle-btn { background: transparent; border: none; color: var(--gold); cursor: pointer; font-size: 1.15em; padding: 6px; border-radius: 6px; transition: var(--transition-smooth); }
        .theme-toggle-btn:hover { background: var(--gold-glow); }

        /* ===== ARTICLE STYLES ===== */
        .article-hero { margin-top: 80px; width: 100%; height: 50vh; min-height: 400px; position: relative; overflow: hidden; border-bottom: 1px solid var(--border-glass); }
        .article-hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        
        .article-container { max-width: 800px; margin: -100px auto 80px; position: relative; z-index: 10; background: var(--bg-deep); padding: 40px; border-radius: 12px; border: 1px solid var(--border-glass); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .article-header { text-align: center; margin-bottom: 40px; }
        .article-date { color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85em; margin-bottom: 15px; display: block; }
        .article-title { font-family: var(--font-display); font-size: 3em; color: var(--article-title-color); line-height: 1.2; font-weight: 600; margin-bottom: 20px;}
        
        .article-body { color: var(--text-slate); font-weight: 300; }
        .article-body p { margin-bottom: 25px; }
        .article-body h2, .article-body h3 { font-family: var(--font-display); color: var(--gold); margin: 40px 0 20px; font-weight: 600; }
        
        .meta-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; }
        .meta-pill { background: var(--meta-pill-bg); color: var(--text-slate); font-size: 0.7em; padding: 6px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid var(--border-glass); }
        .views-pill { color: var(--gold); background: var(--gold-glow); border-color: var(--gold-border); }
        
        /* Share & Back */
        .article-footer { margin-top: 50px; padding-top: 30px; border-top: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: color 0.3s; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .back-link:hover { color: var(--gold); }
        
        .share-links { display: flex; gap: 15px; }
        .share-links a { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; color: var(--share-icon-color); text-decoration: none; transition: var(--transition-smooth); border: 1px solid var(--border-glass); }
        .share-links a:hover { background: var(--gold); border-color: var(--gold); transform: translateY(-3px); }

        /* Loading */
        #loading-state { text-align: center; padding: 150px 0; color: var(--text-muted); }
        #loading-state i { color: var(--gold); font-size: 3em; margin-bottom: 15px; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; padding: 15px 5%; align-items: flex-start; }
            .nav-links { display: flex; gap: 15px; flex-wrap: wrap; }
            .article-hero { margin-top: 100px; height: 35vh; min-height: 250px; }
            .article-container { margin: 0 auto; border-radius: 0; padding: 20px 15px; border-left: none; border-right: none; }
            .article-title { font-size: 1.3em; margin-bottom: 15px; }
            .article-body { font-size: 0.95em; }
            .article-footer { flex-direction: column; gap: 20px; align-items: flex-start; }
        }
    </style>
</head>

<body>
    <!-- Theme Initializer -->
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <!-- Header -->
    <header>
        <a href="../../index.html" class="logo-group" style="text-decoration: none;">
            <div class="logo-img-wrap">
                <img src="../../logo.jpeg" alt="Logo">
            </div>
            <div class="logo-text-wrap">
                <span class="logo-text">Stitch &amp; Styles</span>
                <span class="logo-sub">Find Your Perfect Fit</span>
            </div>
        </a>
        <nav>
            <div class="nav-links">
                <a href="../../index.html#categories-section">Categories</a>
                <a href="../../index.html#providers-section">Providers</a>
                <a href="marketplace.html">Marketplace</a>
                <a href="blog.html" style="color: var(--gold);">Style Blog</a>
                <a href="../../index.html#hiw-section">How It Works</a>
            </div>
            <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="togglePostTheme()" title="Toggle light/dark mode">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
        </nav>
    </header>

    <div id="loading-state">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p>Loading article...</p>
    </div>

    <div id="article-content" style="display: none;">
        <div class="article-hero">
            <img id="hero-img" src="../../hero_bg.png" alt="Hero Image">
        </div>

        <main class="article-container">
            <header class="article-header">
                <div class="meta-tags" id="post-meta"></div>
                <h1 class="article-title" id="post-title"></h1>
            </header>
            
            <div class="article-body" id="post-body">
                <!-- Content injected here -->
            </div>
            
            <footer class="article-footer">
                <a href="blog.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Blog</a>
                
                <button id="like-btn" onclick="toggleLike()" style="background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px;">
                    <i class="far fa-heart" id="like-icon"></i> <span id="like-count">0</span> Likes
                </button>

                <div class="share-links">
                    <a href="#" id="share-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <a href="#" id="share-fb" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" id="share-tw" target="_blank"><i class="fab fa-twitter"></i></a>
                </div>
            </footer>
        </main>
    </div>

    <script>
        const client = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

        async function fetchPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            
            if (!slug) {
                document.getElementById('loading-state').innerHTML = '<p style="text-align:center; color:red;">Article not found.</p>';
                return;
            }

            // Increment views (fails silently if RPC doesn't exist yet)
            client.rpc('increment_blog_views', { blog_slug: slug }).then(({error}) => {
                if (error) console.log("Views not tracked yet:", error.message);
            });

            const { data, error } = await client
                .from('blogs')
                .select('*, user_profiles(full_name), blog_likes(id, user_id)')
                .eq('slug', slug)
                .single();

            if (error || !data) {
                console.error("Error fetching article:", error);
                document.getElementById('loading-state').innerHTML = `<p style="color:red;">Article not found.</p><br><a href="blog.html" class="back-link" style="justify-content:center"><i class="fas fa-arrow-left"></i> Back to Blog</a>`;
                return;
            }

            // Populate Data
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('article-content').style.display = 'block';

            document.getElementById('post-title').innerText = data.title;
            document.title = `${data.title} | Stitch & Styles Kenya`;
            
            // Inject SEO Meta Tags for Google
            const excerpt = data.excerpt || data.content.replace(/<[^>]+>/g, '').substring(0, 150) + '...';
            const imgUrl = data.image_url ? (data.image_url.startsWith('http') ? data.image_url : `../../${data.image_url}`) : '../../hero_bg.png';
            
            const metaDescription = document.createElement('meta');
            metaDescription.name = "description";
            metaDescription.content = excerpt;
            document.head.appendChild(metaDescription);

            const ogTitle = document.createElement('meta');
            ogTitle.property = "og:title";
            ogTitle.content = data.title;
            document.head.appendChild(ogTitle);

            const ogImage = document.createElement('meta');
            ogImage.property = "og:image";
            ogImage.content = imgUrl;
            document.head.appendChild(ogImage);
            
            const date = new Date(data.created_at).toLocaleDateString('en-KE', { 
                year: 'numeric', month: 'long', day: 'numeric' 
            });
            
            const authorName = data.user_profiles?.full_name || 'Stitch & Styles';
            const viewsCount = data.views || 0;
            
            document.getElementById('post-meta').innerHTML = `
                <span class="meta-pill"><i class="far fa-calendar-alt"></i> ${date}</span>
                <span class="meta-pill"><i class="far fa-user"></i> ${authorName}</span>
                <span class="meta-pill views-pill"><i class="far fa-eye"></i> ${viewsCount} Views</span>
            `;
            
            window.currentPostId = data.id;
            const likes = data.blog_likes || [];
            document.getElementById('like-count').innerText = likes.length;
            
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                const userLiked = likes.some(l => l.user_id === session.user.id);
                if (userLiked) {
                    document.getElementById('like-icon').classList.replace('far', 'fas');
                }
            }
            
            document.getElementById('post-body').innerHTML = data.content;
            document.getElementById('hero-img').src = imgUrl;

            // Setup Share Links
            const currentUrl = encodeURIComponent(window.location.href);
            const titleEncoded = encodeURIComponent(data.title);
            document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${titleEncoded}%20${currentUrl}`;
            document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;
            document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?url=${currentUrl}&text=${titleEncoded}`;
        }

        async function toggleLike() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) {
                alert("Please log in to like articles.");
                return;
            }
            
            const icon = document.getElementById('like-icon');
            const countEl = document.getElementById('like-count');
            let currentCount = parseInt(countEl.innerText);
            
            if (icon.classList.contains('fas')) {
                // Unlike
                icon.classList.replace('fas', 'far');
                countEl.innerText = currentCount - 1;
                await client.from('blog_likes').delete().eq('blog_id', window.currentPostId).eq('user_id', session.user.id);
            } else {
                // Like
                icon.classList.replace('far', 'fas');
                countEl.innerText = currentCount + 1;
                await client.from('blog_likes').insert([{ blog_id: window.currentPostId, user_id: session.user.id }]);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchPost();
            // Sync icon with saved theme
            const saved = localStorage.getItem('theme') || 'dark';
            const icon = document.getElementById('theme-icon');
            if (icon) icon.className = saved === 'light' ? 'fas fa-sun' : 'fas fa-moon';
        });

        function togglePostTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.className = next === 'light' ? 'fas fa-sun' : 'fas fa-moon';
        }
    </script>
</body>
</html>
