<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creations & Tailors Marketplace | Ephraims Bespoke</title>
    <link rel="icon" type="image/png" href="../../logo.png?v=2">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --brand-navy: #0a192f;
            --brand-navy-light: #112240;
            --brand-gold: #D4AF37;
            --brand-gold-hover: #f39c12;
            --brand-gold-light: #f4e5bc;
            --brand-white: #ffffff;
            --brand-slate: #8892b0;
            --brand-light-slate: #a8b2d1;
            --bg-dark: #060c18;
            --card-bg: rgba(17, 34, 64, 0.55);
            --glass-border: rgba(212, 175, 55, 0.15);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--brand-white);
            line-height: 1.6;
            background-image: radial-gradient(circle at 50% 50%, rgba(10, 25, 47, 0.8) 0%, transparent 100%),
                              radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== NAVIGATION HEADER ===== */
        header {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .logo-group img {
            height: 40px;
            width: auto;
            border-radius: 4px;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.4em;
            color: var(--brand-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .brand-sub {
            font-size: 0.55em;
            letter-spacing: 3px;
            color: var(--brand-white);
            display: block;
            margin-top: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        nav a {
            color: var(--brand-light-slate);
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        nav a:hover {
            color: var(--brand-gold);
        }

        .nav-auth-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-login {
            color: var(--brand-white);
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 6px;
            transition: var(--transition-smooth);
        }

        .btn-login:hover {
            color: var(--brand-gold);
        }

        .btn-signup {
            background: transparent;
            border: 1px solid var(--brand-gold);
            color: var(--brand-gold);
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 6px;
            transition: var(--transition-smooth);
        }

        .btn-signup:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-1px);
        }

        .nav-user-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 12px;
            border-radius: 30px;
        }

        .nav-user-name {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--brand-gold-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-portal {
            background: var(--brand-gold);
            color: var(--brand-navy);
            border: none;
            font-size: 0.8em;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-portal:hover {
            background: var(--brand-gold-hover);
        }

        .btn-signout {
            background: transparent;
            border: none;
            color: #ef4444;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-left: 5px;
        }

        .btn-signout:hover {
            color: #f87171;
            text-decoration: underline;
        }

        /* ===== MAIN MARKETPLACE AREA ===== */
        main {
            flex: 1;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .marketplace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 20px;
        }

        .header-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: var(--brand-white);
            margin-bottom: 6px;
        }

        .header-title p {
            font-size: 0.9em;
            color: var(--brand-slate);
        }

        /* Search Bar & Filters */
        .search-container {
            background: rgba(17, 34, 64, 0.6);
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 750px;
        }

        .search-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 160px;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding-right: 10px;
        }

        .search-group:last-child {
            border-right: none;
            padding-right: 0;
        }

        .search-group i {
            color: var(--brand-gold);
            font-size: 0.9em;
        }

        .search-group input, .search-group select {
            background: transparent;
            border: none;
            color: var(--brand-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85em;
            outline: none;
            width: 100%;
        }

        .search-group select {
            cursor: pointer;
        }

        .search-group select option, .search-group select optgroup {
            background-color: var(--brand-navy-light);
            color: var(--brand-white);
        }

        /* Toggle Buttons */
        .toggle-container {
            display: flex;
            background: rgba(17, 34, 64, 0.4);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: fit-content;
            margin-bottom: 30px;
            gap: 5px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--brand-slate);
            padding: 8px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active {
            background: var(--brand-gold);
            color: var(--brand-navy);
        }

        /* Grid Layouts */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        @media (min-width: 1200px) {
            .content-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Card Styles */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-banner-wrap {
            height: 180px;
            overflow: hidden;
            position: relative;
            background: #0d1e3d;
        }

        .card-banner-blur {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            opacity: 0.4;
        }

        .card-banner {
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 1;
            transition: transform 0.5s ease;
        }

        .card:hover .card-banner {
            transform: scale(1.05);
        }

        /* Premium Listing Card Image Overrides (prevent cropping) */
        .listing-card .card-banner-wrap {
            height: 240px;
            position: relative;
            background-color: #060c18;
        }

        .listing-card .card-banner-blur {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.5);
            opacity: 0.65;
            z-index: 1;
        }

        .listing-card .card-banner {
            position: relative;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            z-index: 2;
            height: 100%;
        }

        .badge-discount, .badge-new {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            pointer-events: none;
            font-family: 'Montserrat', sans-serif;
        }
        .badge-discount {
            background-color: #ef4444; /* red */
            color: #ffffff;
        }
        .badge-new {
            background-color: #22c55e; /* green */
            color: #ffffff;
            font-size: 0.68em;
            padding: 3px 8px;
            left: 8px;
        }

        .card-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--bg-dark);
            background: var(--brand-navy);
            position: absolute;
            top: 145px;
            left: 20px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            color: var(--brand-gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-size: cover;
            background-position: center;
        }

        .card-body {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* For shop card spacing */
        .shop-card .card-body {
            padding-top: 20px;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            color: var(--brand-white);
            margin-bottom: 8px;
        }

        .card-location {
            font-size: 0.82em;
            color: var(--brand-slate);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-desc {
            font-size: 0.88em;
            color: var(--brand-light-slate);
            margin-bottom: 6px;
            flex: none;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 8px;
            margin-top: auto;
        }

        @media (max-width: 1024px) {
            .listing-card .card-banner-wrap {
                height: 200px !important;
            }
        }

        .card-badge {
            font-size: 0.72em;
            font-weight: 700;
            background: rgba(212, 175, 55, 0.15);
            color: var(--brand-gold);
            padding: 4px 10px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-tag {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--brand-gold);
            white-space: nowrap !important;
        }

        .card-btn {
            background: transparent;
            border: 1px solid var(--brand-gold);
            color: var(--brand-gold);
            font-size: 0.82em;
            font-weight: 700;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap !important;
        }

        .card-btn:hover {
            background: var(--brand-gold);
            color: var(--brand-navy);
        }

        /* ===== FOOTER ===== */
        footer {
            background: #030712;
            padding: 40px 5% 20px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            margin-top: auto;
        }

        footer p {
            color: var(--brand-slate);
            font-size: 0.85em;
        }

        /* ===== LOADER ===== */
        .loader-container {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 0;
            color: var(--brand-slate);
        }

        .loader-spinner {
            font-size: 2.5em;
            color: var(--brand-gold);
            margin-bottom: 15px;
            animation: fa-spin 1.5s infinite linear;
        }
        @media (max-width: 600px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                gap: 10px;
                padding: 12px 5%;
            }
            .brand-logo {
                font-size: 1.05em;
            }
            .brand-sub {
                display: none;
            }
            nav {
                width: auto;
                justify-content: flex-end;
                flex-wrap: nowrap;
                gap: 15px;
            }
            nav a, .btn-login, .btn-signup, .btn-portal, .nav-user-name, .btn-signout {
                font-size: 0 !important;
                padding: 5px !important;
                background: transparent !important;
                border: none !important;
            }
            nav a i, .btn-login i, .btn-signup i, .btn-portal i, .nav-user-name i, .btn-signout i {
                font-size: 18px !important;
            }
            .nav-user-pill {
                padding: 4px !important;
                gap: 12px !important;
                border: none !important;
                background: transparent !important;
            }
            .content-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 12px !important;
            }
            .listing-card .card-banner-wrap {
                height: 180px;
            }
            .listing-card .card-body {
                padding: 10px !important;
            }
            .listing-card .card-body h3 {
                font-size: 0.82em !important;
                line-height: 1.25 !important;
                display: -webkit-box !important;
                -webkit-line-clamp: 2 !important;
                -webkit-box-orient: vertical !important;
                overflow: hidden !important;
                height: 2.5em !important;
                white-space: normal !important;
            }
            .listing-card .card-desc {
                display: none !important;
            }
            .listing-card .card-badge {
                font-size: 0.62em !important;
                padding: 3px 8px !important;
            }
            .listing-card .card-body span[title] {
                font-size: 0.72em !important;
            }
            .listing-card .card-footer {
                flex-direction: column;
                align-items: stretch !important;
                gap: 4px !important;
                margin-top: 8px !important;
                padding-top: 8px !important;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }
            .listing-card .price-tag {
                font-size: 0.88em !important;
            }
            .listing-card .card-btn {
                width: 100%;
                text-align: center;
                padding: 6px !important;
                font-size: 0.75em !important;
                margin-top: 4px;
            }
        }
    </style>
    <link rel="manifest" href="../../manifest.json">
</head>

<body>

    <!-- ===== NAVIGATION HEADER ===== -->
    <header>
        <a href="../../index.html" class="logo-group">
            <img src="../../logo.png" alt="Logo" onerror="this.style.display='none'">
            <div>
                <h1 class="brand-logo" id="brand-logo-text">EPHRAIMS BESPOKE</h1>
                <span class="brand-sub" id="brand-sub-text">BY RONNY</span>
            </div>
        </a>

        <nav>
            <a href="../../index.html"><i class="fas fa-home"></i> Home</a>
            <a href="marketplace.html" style="color: var(--brand-gold);"><i class="fas fa-shopping-bag"></i> Marketplace</a>
            <div class="nav-auth-buttons" id="nav-auth-area">
                <i class="fas fa-spinner fa-spin" style="color: var(--brand-gold);"></i>
            </div>
        </nav>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        <div class="marketplace-header">
            <div class="header-title">
                <h2>Bespoke Marketplace</h2>
                <p>Browse directories, discover custom designs, and hire expert tailors.</p>
            </div>

            <!-- Dynamic Search Container -->
            <div class="search-container">
                <div class="search-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="mkt-search-query" placeholder="Search creations..." onkeyup="filterMarketplace()">
                </div>
                <div class="search-group">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="mkt-search-location" placeholder="City / Location..." onkeyup="filterMarketplace()">
                </div>
                <div class="search-group">
                    <i class="fas fa-tags"></i>
                    <select id="mkt-category-filter" onchange="filterMarketplace()">
                        <option value="">All Categories</option>
                        <optgroup label="— Tailored Clothing —">
                            <option value="Suits">Suits</option>
                            <option value="Senator Wear">Senator Wear</option>
                            <option value="Dresses">Dresses</option>
                            <option value="Shirts">Shirts</option>
                            <option value="Trousers">Trousers</option>
                            <option value="Coats">Coats</option>
                            <option value="Alterations">Alterations</option>
                        </optgroup>
                        <optgroup label="— Ready-made Clothing —">
                            <option value="Jumpsuits &amp; Rompers">Jumpsuits &amp; Rompers</option>
                            <option value="Hoodies &amp; Sweatshirts">Hoodies &amp; Sweatshirts</option>
                            <option value="T-Shirts &amp; Polos">T-Shirts &amp; Polos</option>
                            <option value="Jeans &amp; Denim">Jeans &amp; Denim</option>
                            <option value="Jackets &amp; Cardigans">Jackets &amp; Cardigans</option>
                            <option value="Ready-to-Wear Dresses">Ready-to-Wear Dresses</option>
                            <option value="Activewear">Activewear</option>
                        </optgroup>
                        <optgroup label="— Accessories —">
                            <option value="Watches">Watches</option>
                            <option value="Glasses &amp; Shades">Glasses &amp; Shades</option>
                            <option value="Ties &amp; Bowties">Ties &amp; Bowties</option>
                            <option value="Scarves &amp; Capes">Scarves &amp; Capes</option>
                            <option value="Belts">Belts</option>
                            <option value="Hats &amp; Caps">Hats &amp; Caps</option>
                            <option value="Bags &amp; Clutches">Bags &amp; Clutches</option>
                            <option value="Jewellery">Jewellery</option>
                        </optgroup>
                        <optgroup label="— Footwear —">
                            <option value="Shoes">Shoes</option>
                            <option value="Sandals &amp; Slippers">Sandals &amp; Slippers</option>
                            <option value="Boots">Boots</option>
                        </optgroup>
                    </select>
                </div>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="toggle-container">
            <button class="toggle-btn active" id="btn-mode-listings" onclick="setMarketplaceMode('listings')">
                <i class="fas fa-cut"></i> Creations &amp; Designs
            </button>
            <button class="toggle-btn" id="btn-mode-shops" onclick="setMarketplaceMode('shops')">
                <i class="fas fa-store"></i> Tailoring Shops
            </button>
            <button class="toggle-btn" id="btn-mode-favourites" onclick="setMarketplaceMode('favourites')" style="display: none;">
                <i class="fas fa-heart"></i> Saved Favourites
            </button>
        </div>

        <!-- Creations (Listings) Grid -->
        <div class="content-grid" id="listings-grid">
            <div class="loader-container">
                <i class="fas fa-spinner loader-spinner"></i>
                <p>Loading marketplace creations...</p>
            </div>
        </div>

        <!-- Shops Grid -->
        <div class="content-grid" id="shops-grid" style="display: none;">
            <div class="loader-container">
                <i class="fas fa-spinner loader-spinner"></i>
                <p>Loading tailoring shops...</p>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>&copy; 2026 Ephraims Bespoke. All Rights Reserved.</p>
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script src="../../js/core/config.js?v=1781434537375"></script>
    <script>
        let supabaseClient;
        let allShops = [];
        let allListings = [];
        let allReviews = [];
        let activeMode = 'listings'; // 'listings' or 'shops'
        let currentUser;
        let userLikes = [];
        let globalLikesCount = {};

        // Apply config branding dynamically
        if (typeof APP_CONFIG !== 'undefined') {
            document.getElementById('brand-logo-text').textContent = APP_CONFIG.appName || 'EPHRAIMS BESPOKE';
            document.getElementById('brand-sub-text').textContent = APP_CONFIG.appSubtitle || 'BY RONNY';
            if (APP_CONFIG.logoPath) {
                const logoImg = document.querySelector('.logo-group img');
                if (logoImg) logoImg.src = APP_CONFIG.logoPath;
            }
        }

        // Initialize Supabase
        if (typeof window.supabase !== 'undefined' && typeof APP_CONFIG !== 'undefined') {
            supabaseClient = window.supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);
            checkSession();
            loadMarketplace();
        }

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g,
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        async function toggleLike(listingId) {
            if (!currentUser) {
                alert("Please log in to like creations.");
                return;
            }
            const btn = document.getElementById(`like-btn-${listingId}`);
            if (!btn) return;
            const icon = btn.querySelector('i');
            if (!icon) return;

            const isCurrentlyLiked = userLikes.includes(listingId);
            
            // Optimistic UI Update
            if (isCurrentlyLiked) {
                userLikes = userLikes.filter(id => id !== listingId);
                icon.className = 'far fa-heart';
                btn.style.color = 'var(--brand-slate)';
            } else {
                userLikes.push(listingId);
                icon.className = 'fas fa-heart';
                btn.style.color = '#ef4444';
                btn.style.transform = 'scale(1.3)';
                setTimeout(() => btn.style.transform = 'scale(1)', 200);
            }

            if (activeMode === 'favourites') {
                filterMarketplace();
            }

            try {
                if (isCurrentlyLiked) {
                    const { error } = await supabaseClient
                        .from('marketplace_likes')
                        .delete()
                        .eq('user_id', currentUser.id)
                        .eq('listing_id', listingId);
                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('marketplace_likes')
                        .insert([{ user_id: currentUser.id, listing_id: listingId }]);
                    if (error) throw error;
                }
            } catch (err) {
                console.error("Failed to toggle like:", err);
                // Revert
                if (isCurrentlyLiked) {
                    userLikes.push(listingId);
                    icon.className = 'fas fa-heart';
                    btn.style.color = '#ef4444';
                } else {
                    userLikes = userLikes.filter(id => id !== listingId);
                    icon.className = 'far fa-heart';
                    btn.style.color = 'var(--brand-slate)';
                }
                if (activeMode === 'favourites') {
                    filterMarketplace();
                }
            }
        }

        // Fetch Data from Supabase Database
        async function loadMarketplace() {
            try {
                // 1. Fetch public shops
                let { data: shops, error: shopsErr } = await supabaseClient
                    .from('shops')
                    .select('*')
                    .eq('is_public', true);
                allShops = shops || [];

                // 2. Fetch active creations
                let { data: listings, error: listingsErr } = await supabaseClient
                    .from('marketplace_listings')
                    .select('*, shops(name, profile_image)')
                    .eq('status', 'active');
                allListings = listings || [];

                // 3. Fetch reviews
                let { data: reviews } = await supabaseClient
                    .from('vw_marketplace_reviews')
                    .select('*');
                allReviews = reviews || [];

                // 4. Fetch user likes if logged in
                currentUser = (await supabaseClient.auth.getUser())?.data?.user;
                if (currentUser) {
                    let { data: likes, error: likesErr } = await supabaseClient
                        .from('marketplace_likes')
                        .select('listing_id')
                        .eq('user_id', currentUser.id);
                    if (!likesErr && likes) {
                        userLikes = likes.map(l => l.listing_id);
                    }
                }

                // 5. Fetch global likes count (Aggregate)
                let { data: allLikesData } = await supabaseClient
                    .from('marketplace_likes')
                    .select('listing_id');
                if (allLikesData) {
                    globalLikesCount = {};
                    allLikesData.forEach(l => {
                        globalLikesCount[l.listing_id] = (globalLikesCount[l.listing_id] || 0) + 1;
                    });
                }

                // Check URL params for category filter trigger
                const urlParams = new URLSearchParams(window.location.search);
                const catParam = urlParams.get('category');
                if (catParam) {
                    const select = document.getElementById('mkt-category-filter');
                    if (select) {
                        select.value = catParam;
                    }
                }
                const tabParam = urlParams.get('tab');
                if (tabParam === 'shops') {
                    setMarketplaceMode('shops');
                } else {
                    renderShops(allShops);
                    renderListings(allListings);
                    filterMarketplace();
                }

            } catch (err) {
                console.error("Marketplace fetch error:", err);
                document.getElementById('listings-grid').innerHTML = `<p style="color:red;grid-column:1/-1;text-align:center;">Failed to connect to database.</p>`;
            }
        }

        // Search & Filter Controller
        function filterMarketplace() {
            const query = document.getElementById('mkt-search-query').value.toLowerCase().trim();
            const location = document.getElementById('mkt-search-location').value.toLowerCase().trim();
            const category = document.getElementById('mkt-category-filter').value;

            if (activeMode === 'shops') {
                const filteredShops = allShops.filter(shop => {
                    const nameMatch = !query || 
                        (shop.name && shop.name.toLowerCase().includes(query)) ||
                        (shop.description && shop.description.toLowerCase().includes(query));
                    
                    const locMatch = !location || 
                        (shop.location_name && shop.location_name.toLowerCase().includes(location)) ||
                        (shop.location && shop.location.toLowerCase().includes(location));

                    return nameMatch && locMatch;
                });

                // Sort Shops by Bespoke Score (Reputation + Profile Quality)
                filteredShops.sort((a, b) => calculateShopScore(b) - calculateShopScore(a));

                renderShops(filteredShops);
            } else {
                const filteredListings = allListings.filter(list => {
                    if (activeMode === 'favourites') {
                        if (!userLikes.includes(list.id)) return false;
                    }

                    const titleMatch = !query || 
                        (list.title && list.title.toLowerCase().includes(query)) ||
                        (list.description && list.description.toLowerCase().includes(query)) ||
                        (list.category && list.category.toLowerCase().includes(query));

                    const categoryMatch = !category || list.category === category;

                    const shop = allShops.find(s => s.id === list.shop_id);
                    const locMatch = !location || (shop && (
                        (shop.location_name && shop.location_name.toLowerCase().includes(location)) ||
                        (shop.location && shop.location.toLowerCase().includes(location))
                    ));

                    return titleMatch && categoryMatch && locMatch;
                });

                // Algorithm: Sort by Bespoke Score (Popularity > Quality > Recency > Profile)
                filteredListings.sort((a, b) => {
                    return calculateBespokeScore(b) - calculateBespokeScore(a);
                });

                renderListings(filteredListings);
            }
        }

        // Advanced Marketplace Ranking Engine
        function calculateBespokeScore(list) {
            let score = 0;
            const shop = allShops.find(s => s.id === list.shop_id);

            // 1. Engagement & Popularity (Max 40 pts) - Highly weighted
            const views = list.views || 0;
            const likes = globalLikesCount[list.id] || 0;
            const viewsScore = Math.min(Math.log10(views + 1) * 6, 20); // up to 20 pts
            const likesScore = Math.min(Math.log10(likes + 1) * 12, 20); // up to 20 pts
            score += (viewsScore + likesScore);

            // 2. Quality & Reputation (Max 30 pts)
            const shopReviews = allReviews.filter(r => r.shop_id === list.shop_id);
            const avgRating = shopReviews.length > 0
                ? (shopReviews.reduce((sum, r) => sum + r.rating, 0) / shopReviews.length)
                : 0;
            
            if (avgRating > 0) {
                const ratingScore = (avgRating / 5) * 20; // up to 20 pts
                const volumeBonus = Math.min(shopReviews.length * 0.5, 10); // up to 10 pts
                score += (ratingScore + volumeBonus);
            } else {
                score += 15; // Baseline for new shops
            }

            // 3. Recency & Freshness (Max 15 pts)
            if (list.created_at) {
                const ageDays = (new Date() - new Date(list.created_at)) / (1000 * 60 * 60 * 24);
                const recencyScore = Math.max(0, 15 * Math.pow(0.85, ageDays)); // Exponential decay
                score += recencyScore;
            }

            // 4. Shop Profile Quality (Max 15 pts)
            let profileScore = 0;
            if (shop) {
                if (shop.profile_image && shop.profile_image !== 'undefined') profileScore += 5;
                if (shop.banner_image && shop.banner_image !== 'undefined') profileScore += 5;
                if (shop.description && shop.description.length > 20) profileScore += 5;
            }
            score += profileScore;

            // Random variance to break exact ties
            score += Math.random() * 0.1;

            return score;
        }

        function calculateShopScore(shop) {
            let score = 0;
            const shopReviews = allReviews.filter(r => r.shop_id === shop.id);
            const avgRating = shopReviews.length > 0 ? (shopReviews.reduce((sum, r) => sum + r.rating, 0) / shopReviews.length) : 0;
            
            // 1. Reputation (Max 50 pts)
            if (avgRating > 0) {
                const ratingScore = (avgRating / 5) * 35; 
                const volumeBonus = Math.min(shopReviews.length * 1, 15); 
                score += (ratingScore + volumeBonus);
            } else {
                score += 20; // Baseline for new shops
            }

            // 2. Profile Quality (Max 30 pts)
            if (shop.profile_image && shop.profile_image !== 'undefined') score += 10;
            if (shop.banner_image && shop.banner_image !== 'undefined') score += 10;
            if (shop.description && shop.description.length > 20) score += 10;

            score += Math.random() * 0.1; // Tie breaker
            return score;
        }

        // Track a listing card click — increments view counter via DB function
        const trackedListingClicks = new Set();
        async function trackListingView(listingId, fallbackUrl) {
            if (!listingId || trackedListingClicks.has(listingId)) return;
            trackedListingClicks.add(listingId);
            setTimeout(() => trackedListingClicks.delete(listingId), 2000);

            const today = new Date().toISOString().split('T')[0];
            const viewKey = `viewed_${listingId}`;
            const lastViewed = localStorage.getItem(viewKey);

            if (lastViewed !== today && supabaseClient && !listingId.startsWith('mock')) {
                // Optimistically update the UI to fix stale browser back/forward cache (BFCache)
                const viewSpan = document.getElementById(`view-count-${listingId}`);
                if (viewSpan) {
                    const currentViews = parseInt(viewSpan.innerText.replace(/[^0-9]/g, '')) || 0;
                    viewSpan.innerHTML = `<i class="fas fa-eye" style="margin-right:3px;"></i>${currentViews + 1}`;
                }

                try {
                    await supabaseClient.rpc('increment_listing_views', { listing_id: listingId });
                    localStorage.setItem(viewKey, today);
                } catch (e) { /* silent — don't block navigation */ }
            }
            // Navigate to the action page after tracking
            setTimeout(() => window.location.href = fallbackUrl, 120);
        }
    </script>
</body>
