<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TKKW51QFZ5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TKKW51QFZ5');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO & Metadata -->
    <title>Blog | Stitch & Styles Kenya</title>
    <meta name="description" content="Discover the latest fashion trends, tailoring tips, and style guides from the best tailors in Nairobi, Kenya.">
    <meta name="keywords" content="fashion blog, kenyan style, tailoring tips, bespoke suits, african dresses, nairobi fashion">
    <link rel="icon" type="image/png" href="../../logo.jpeg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="/js/lib/supabase.min.js"></script>
    <script src="/js/core/config.js"></script>

    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            --bg-deep: #030712;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-card-hover: rgba(31, 41, 55, 0.85);
            --gold: #d4af37;
            --gold-light: #f3cd57;
            --gold-glow: rgba(212, 175, 55, 0.15);
            --gold-border: rgba(212, 175, 55, 0.25);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-slate: #d1d5db;
            --border-glass: rgba(255, 255, 255, 0.08);
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.5);
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background-color: var(--bg-deep); color: var(--text-main); line-height: 1.6; }

        /* ===== HEADER (Matched to Index) ===== */
        header { position: fixed; top: 0; left: 0; width: 100%; padding: 14px 8%; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--border-glass); }
        .logo-group { display: flex; flex-direction: column; text-decoration: none; }
        .logo-text { font-family: var(--font-display); font-weight: 700; font-size: 1.35em; color: var(--gold); letter-spacing: 0.5px; text-transform: uppercase; }
        .logo-sub { font-size: 0.55em; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-top: -2px; }
        nav { display: flex; align-items: center; gap: 32px; }
        .nav-links { display: flex; align-items: center; gap: 28px; }
        .nav-links a { color: var(--text-slate); text-decoration: none; font-weight: 500; font-size: 0.92em; transition: var(--transition-smooth); position: relative; padding: 4px 0; }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--gold); transition: var(--transition-smooth); }
        .nav-links a:hover { color: var(--gold); }
        .nav-links a:hover::after { width: 100%; }

        /* ===== PAGE HEADER ===== */
        .page-header { margin-top: 100px; padding: 60px 8% 40px; text-align: center; }
        .page-header h1 { font-family: var(--font-display); font-size: 3em; color: var(--gold); margin-bottom: 15px; font-weight: 600; }
        .page-header p { color: var(--text-muted); font-size: 1.1em; max-width: 600px; margin: 0 auto; }

        /* ===== BLOG GRID ===== */
        .blog-container { padding: 0 8% 80px; }
        .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        
        /* ===== BLOG CARD ===== */
        .blog-card { background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 12px; overflow: hidden; transition: var(--transition-smooth); display: flex; flex-direction: column; text-decoration: none; }
        .blog-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-premium); border-color: var(--gold-border); background: var(--bg-card-hover); }
        .blog-img { width: 100%; height: 220px; object-fit: cover; border-bottom: 1px solid var(--border-glass); }
        .blog-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .meta-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .meta-pill { background: rgba(255, 255, 255, 0.05); color: var(--text-slate); font-size: 0.7em; padding: 6px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid var(--border-glass); }
        .views-pill { color: var(--gold); background: var(--gold-glow); border-color: var(--gold-border); }
        
        .blog-title { font-family: var(--font-display); font-size: 1.4em; color: var(--gold); margin-bottom: 15px; line-height: 1.3; font-weight: 600; }
        .blog-excerpt { color: var(--text-slate); font-size: 0.95em; line-height: 1.6; flex-grow: 1; }
        
        .read-more { margin-top: 20px; display: inline-flex; align-items: center; gap: 8px; color: var(--gold); font-weight: 600; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
        .read-more i { transition: transform 0.3s; }
        .blog-card:hover .read-more i { transform: translateX(5px); }
        
        /* Loading & Empty States */
        #loading-state { text-align: center; padding: 50px; color: var(--text-muted); }
        #loading-state i { color: var(--gold); font-size: 2em; margin-bottom: 15px; }
        
        @media (max-width: 1024px) {
            .blog-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; padding: 15px 5%; align-items: flex-start; }
            .nav-links { display: flex; gap: 15px; flex-wrap: wrap; }
            .page-header { margin-top: 130px; padding: 30px 5%; }
            .page-header h1 { font-size: 2.2em; }
            .blog-grid { grid-template-columns: 1fr; gap: 20px; }
            .blog-container { padding: 0 5% 50px; }
            .blog-img { height: 180px; }
            .blog-content { padding: 18px; }
            .blog-title { font-size: 1.25em; }
            .meta-pill { font-size: 0.65em; padding: 4px 8px; }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <a href="../../index.html" class="logo-group">
            <span class="logo-text">Stitch & Styles</span>
            <span class="logo-sub">Kenya</span>
        </a>
        <nav>
            <div class="nav-links">
                <a href="../../index.html">Home</a>
                <a href="marketplace.html">Marketplace</a>
                <a href="blog.html" style="color: var(--gold); border-bottom: 1px solid var(--gold);">Style Blog</a>
            </div>
        </nav>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <h1>The Style Edit</h1>
        <p>Insights, trends, and expert tailoring advice from Kenya's finest designers and artisans.</p>
    </section>

    <!-- Blog Container -->
    <section class="blog-container">
        <div id="loading-state">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Loading latest articles...</p>
        </div>
        <div class="blog-grid" id="blog-grid" style="display: none;">
            <!-- Dynamically populated -->
        </div>
    </section>

    <script>
        const client = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

        async function fetchBlogs() {
            const { data, error } = await client
                .from('blogs')
                .select('*, user_profiles(full_name)')
                .eq('status', 'published')
                .order('created_at', { ascending: false });

            const loadingState = document.getElementById('loading-state');
            const grid = document.getElementById('blog-grid');

            loadingState.style.display = 'none';

            if (error) {
                console.error("Error fetching blogs:", error);
                grid.style.display = 'block';
                grid.innerHTML = `<p style="color:red;">Error loading articles. Please try again later.</p>`;
                return;
            }

            if (!data || data.length === 0) {
                grid.style.display = 'block';
                grid.innerHTML = `<p style="color: var(--text-muted); text-align: center; width: 100%;">No articles published yet. Check back soon!</p>`;
                return;
            }

            grid.style.display = 'grid';
            
            data.forEach(post => {
                const date = new Date(post.created_at).toLocaleDateString('en-KE', { 
                    year: 'numeric', month: 'long', day: 'numeric' 
                });
                
                // Get author name
                const authorName = post.user_profiles?.full_name || 'Stitch & Styles';
                // Mock views for visual layout
                const views = Math.floor(Math.random() * 1000) + 150;
                
                // Create excerpt (strip HTML and cut length)
                const tmp = document.createElement("DIV");
                tmp.innerHTML = post.content;
                let excerptText = tmp.textContent || tmp.innerText || "";
                if(excerptText.length > 120) {
                    excerptText = excerptText.substring(0, 120) + '...';
                }

                const card = document.createElement('a');
                card.href = `blog-post.html?slug=${post.slug}`;
                card.className = 'blog-card';

                const imgUrl = post.image_url ? (post.image_url.startsWith('http') ? post.image_url : `../../${post.image_url}`) : '../../hero_bg.png';

                card.innerHTML = `
                    <img src="${imgUrl}" alt="${post.title}" class="blog-img">
                    <div class="blog-content">
                        <div class="meta-tags">
                            <span class="meta-pill"><i class="far fa-calendar-alt"></i> ${date}</span>
                            <span class="meta-pill"><i class="far fa-user"></i> ${authorName}</span>
                            <span class="meta-pill views-pill"><i class="far fa-eye"></i> ${views} Views</span>
                        </div>
                        <h2 class="blog-title">${post.title}</h2>
                        <div class="blog-excerpt">${excerptText}</div>
                        <div class="read-more">Read Article <i class="fas fa-arrow-right"></i></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', fetchBlogs);
    </script>
</body>
</html>
