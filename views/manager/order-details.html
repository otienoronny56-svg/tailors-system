            <script>
                if (typeof window.toggleSidebarDropdown !== 'function') {
                    window.toggleSidebarDropdown = function(button) {
                        const event = window.event || (arguments.length > 1 ? arguments[1] : null);
                        if (event) {
                            event.alreadyHandledDropdown = true;
                        }
                        const dropdown = button.closest('.sidebar-dropdown');
                        if (dropdown) {
                            dropdown.classList.toggle('open');
                        }
                    };
                }
            </script>

            <div id="order-detail-container">

                        style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-gold); border-radius: 50%; animation: spin 1s linear infinite;">
                    </div>
                    <p style="margin-top: 15px; color: #666;">Loading order details...</p>
                </div>
                <style>
                    @keyframes spin {
                        0% {
                            transform: rotate(0deg);
                        }

                        100% {
                            transform: rotate(360deg);
                        }
                    }
