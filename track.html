<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order | Tailors Marketplace</title>
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --brand-navy: #0a192f;
            --brand-navy-light: #112240;
            --brand-gold: #D4AF37;
            --brand-gold-hover: #f39c12;
            --brand-white: #ffffff;
            --brand-slate: #8892b0;
            --bg-dark: #060c18;
            --card-bg: rgba(17, 34, 64, 0.7);
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--brand-white);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2em;
            color: var(--brand-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-align: center;
        }

        .header-sub {
            font-size: 0.7em;
            letter-spacing: 3px;
            color: var(--brand-slate);
            text-transform: uppercase;
            margin-bottom: 40px;
            text-align: center;
        }

        .tracking-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 40px 0;
            color: var(--brand-slate);
        }

        .error-state i {
            font-size: 3em;
            color: #ef4444;
            margin-bottom: 15px;
        }

        /* Order Details */
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .order-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--brand-gold);
            margin-bottom: 5px;
        }

        .order-meta {
            font-size: 0.85em;
            color: var(--brand-slate);
        }

        .order-meta strong {
            color: var(--brand-white);
        }

        .price-badge {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--brand-gold);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: right;
        }

        .price-badge .total {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--brand-gold);
        }

        .price-badge .paid {
            font-size: 0.8em;
            color: #2ecc71;
            margin-top: 4px;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
            margin-top: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 5px;
            bottom: 5px;
            width: 2px;
            background: rgba(136, 146, 176, 0.2);
        }

        .timeline-step {
            position: relative;
            margin-bottom: 25px;
        }

        .timeline-step:last-child {
            margin-bottom: 0;
        }

        .step-icon {
            position: absolute;
            left: -30px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--brand-navy-light);
            border: 2px solid var(--brand-slate);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            color: transparent;
            font-size: 0.6em;
            transition: all 0.3s;
        }

        .step-content {
            padding-left: 10px;
        }

        .step-title {
            font-weight: 600;
            color: var(--brand-slate);
            font-size: 1em;
            margin-bottom: 4px;
            transition: color 0.3s;
        }

        .step-desc {
            font-size: 0.8em;
            color: rgba(136, 146, 176, 0.6);
        }

        /* Active / Completed Step */
        .timeline-step.completed .step-icon {
            background: #2ecc71;
            border-color: #2ecc71;
            color: white;
        }

        .timeline-step.completed .step-title {
            color: var(--brand-white);
        }

        .timeline-step.active .step-icon {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-navy);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .timeline-step.active .step-title {
            color: var(--brand-gold);
            font-size: 1.1em;
        }

        .timeline-step.active .step-desc {
            color: var(--brand-light-slate);
        }

        .timeline-step.active ~ .timeline-step .step-icon {
            background: var(--brand-navy);
        }
    </style>
</head>
<body>

    <div>
        <div class="header-logo">Tailors Marketplace</div>
        <div class="header-sub">Order Tracking</div>
    </div>

    <div class="tracking-container" id="tracking-container">
        <div class="loading-state">
            <i class="fas fa-spinner fa-spin" style="font-size: 2em; color: var(--brand-gold); margin-bottom: 15px;"></i>
            <p>Loading your order details...</p>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);

        const STATUS_MAP = {
            1: { title: "Order Assigned", desc: "Your order has been assigned to a tailor." },
            2: { title: "In Progress", desc: "Your garment is currently being stitched." },
            3: { title: "QA Check", desc: "Quality assurance and finishing touches." },
            4: { title: "Ready for Pickup/Delivery", desc: "Your garment is ready!" },
            5: { title: "Collected", desc: "You have received your garment." },
            6: { title: "Closed", desc: "Order finalized." }
        };

        const STATUS_FLOW = [1, 2, 3, 4, 5]; // 6 is treated similarly to 5 for UI

        async function initTracking() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('id');
            const container = document.getElementById('tracking-container');

            if (!orderId) {
                showError("No tracking ID provided. Please use the valid tracking link sent to you.");
                return;
            }

            try {
                // Call the secure RPC function
                const { data, error } = await supabaseClient.rpc('get_tracking_order', { tracking_id: orderId });

                if (error) throw error;
                if (!data || data.length === 0) {
                    showError("Order not found. The tracking ID may be incorrect or the order was deleted.");
                    return;
                }

                renderOrder(data[0]);

            } catch (err) {
                console.error("Tracking Error:", err);
                showError("Unable to fetch order details. Please try again later.");
            }
        }

        function showError(message) {
            document.getElementById('tracking-container').innerHTML = `
                <div class="error-state">
                    <i class="fas fa-search-minus"></i>
                    <h3>Tracking Unavailable</h3>
                    <p style="margin-top: 10px;">${message}</p>
                </div>
            `;
        }

        function renderOrder(order) {
            const container = document.getElementById('tracking-container');
            const currentStatus = order.status;
            
            const dueDateStr = order.due_date 
                ? new Date(order.due_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) 
                : 'Not specified';
            
            const createdStr = order.created_at 
                ? new Date(order.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
                : '—';

            let timelineHtml = '<div class="timeline">';
            
            for (let step of STATUS_FLOW) {
                let stateClass = '';
                let iconHtml = '';
                
                if (currentStatus === 6) { // Closed -> Everything completed
                    stateClass = 'completed';
                    iconHtml = '<i class="fas fa-check"></i>';
                } else if (step < currentStatus) {
                    stateClass = 'completed';
                    iconHtml = '<i class="fas fa-check"></i>';
                } else if (step === currentStatus) {
                    stateClass = 'active';
                    iconHtml = '<i class="fas fa-circle" style="font-size:0.5em;"></i>';
                } else {
                    iconHtml = '';
                }

                timelineHtml += `
                    <div class="timeline-step ${stateClass}">
                        <div class="step-icon">${iconHtml}</div>
                        <div class="step-content">
                            <div class="step-title">${STATUS_MAP[step].title}</div>
                            <div class="step-desc">${STATUS_MAP[step].desc}</div>
                        </div>
                    </div>
                `;
            }
            timelineHtml += '</div>';

            container.innerHTML = `
                <div class="order-header">
                    <div>
                        <div class="order-title">${order.garment_type || 'Custom Garment'}</div>
                        <div class="order-meta">
                            <div>Ordered by: <strong>${order.customer_name}</strong></div>
                            <div>Order Date: <strong>${createdStr}</strong></div>
                            <div style="margin-top: 5px; color: var(--brand-gold);">Due Date: <strong>${dueDateStr}</strong></div>
                        </div>
                    </div>
                    <div class="price-badge">
                        <div class="total">Ksh ${parseFloat(order.price || 0).toLocaleString()}</div>
                        <div class="paid">Paid: Ksh ${parseFloat(order.amount_paid || 0).toLocaleString()}</div>
                    </div>
                </div>
                
                <h4 style="color: var(--brand-white); margin-top: 10px; font-weight: 600;">Order Status Progress</h4>
                ${timelineHtml}
            `;
        }

        window.onload = initTracking;
    </script>
</body>
</html>
