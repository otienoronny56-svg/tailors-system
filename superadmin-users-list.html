<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Users | SaaS Control</title>
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-online { background: #dcfce7; color: #15803d; }
        .status-offline { background: #f1f5f9; color: #64748b; }
        
        .user-table th { background: #f8fafc; color: #475569; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        .user-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .user-table tr:hover { background: #f8fafc; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <h1 class="sidebar-logo">SaaS<span class="sidebar-n"> Control</span></h1>
                    <span class="sidebar-subtitle">PLATFORM ADMIN</span>
                </div>
            </div>
            <p id="user-info">Logged in as: Superadmin</p>
            <nav>
                <a href="superadmin-dashboard.html"><i class="fas fa-chart-line" style="margin-right: 8px;"></i> Overview</a>
                <a href="superadmin-orgs.html"><i class="fas fa-building" style="margin-right: 8px;"></i> Organizations</a>
                <a href="superadmin-users.html"><i class="fas fa-user-shield" style="margin-right: 8px;"></i> Admin Accounts</a>
                <a href="superadmin-users-list.html" class="active"><i class="fas fa-users" style="margin-right: 8px;"></i> Platform Users</a>
                <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 25px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1 style="color: var(--brand-navy); margin: 0;">Platform User Directory</h1>
                        <p style="color: #64748b; font-size: 0.9em; margin-top: 5px;">Monitor user activity and session health across all tenants</p>
                    </div>
                </div>
            </header>

            <section class="order-list" style="background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px;">
                <div style="margin-bottom: 20px; display: flex; gap: 15px;">
                    <input type="text" id="user-search" placeholder="Search by email or name..." style="flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    <button class="small-btn" onclick="loadPlatformUsers()" style="background: white; border: 1px solid #e2e8f0; color: var(--brand-navy);"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>

                <table class="user-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>User Details</th>
                            <th>Organization</th>
                            <th>Role</th>
                            <th>Last Activity</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="platform-users-tbody">
                        <tr><td colspan="5" style="text-align:center; padding:40px;">Initializing secure connection...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- 🌟 MANAGEMENT MODAL 🌟 -->
    <div id="mng-modal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.75); z-index:10000; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
        <div class="modal-content" style="background:white; border-radius:16px; width:100%; max-width:400px; padding:30px; text-align:center; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); animation: modalIn 0.3s ease-out;">
            <div id="mng-modal-icon" style="font-size:48px; margin-bottom:20px;"></div>
            <h2 id="mng-modal-title" style="margin-bottom:10px; color:#1e293b;"></h2>
            <p id="mng-modal-text" style="color:#64748b; line-height:1.6; margin-bottom:25px;"></p>
            <div id="mng-modal-actions" style="display:flex; gap:10px; justify-content:center;">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </div>

    <style>
    @keyframes modalIn {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
    .modal-overlay { 
        display: none; 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: rgba(15, 23, 42, 0.75); 
        z-index: 10000; 
        align-items: center; 
        justify-content: center; 
        backdrop-filter: blur(4px);
    }
    .modal-overlay.active { 
        display: flex !important; 
    }
    </style>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initial load will be handled by checkSession in app.js
        });
    </script>
</body>
</html>
