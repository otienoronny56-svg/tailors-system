<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Access | Stitch 'N Style Kenya</title>
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="/js/lib/supabase.min.js"></script>
    <style>
        :root {
            --brand-navy: #0a192f;
            --brand-navy-light: #112240;
            --brand-gold: #D4AF37;
            --brand-gold-hover: #f39c12;
            --brand-gold-light: #f4e5bc;
            --brand-white: #ffffff;
            --brand-slate: #8892b0;
            --brand-light-slate: #a8b2d1;
            --bg-dark: #060c18;
            --card-bg: rgba(17, 34, 64, 0.75);
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--brand-white);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            padding: 15px;
            background-image: radial-gradient(circle at 50% 50%, rgba(10, 25, 47, 0.8) 0%, transparent 100%),
                              radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.8em;
            color: var(--brand-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .brand-sub {
            font-size: 0.7em;
            letter-spacing: 4px;
            color: var(--brand-white);
            text-transform: uppercase;
            font-weight: 500;
        }

        /* --- Tabs --- */
        .tabs-header {
            display: flex;
            background: rgba(6, 12, 24, 0.5);
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 15px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--brand-slate);
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
        }

        .tab-btn:hover {
            color: var(--brand-white);
        }

        .tab-btn.active {
            color: var(--brand-navy);
            background: var(--brand-gold);
            font-weight: 700;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Sub-tabs for signup --- */
        .role-pills {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-pill {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 0.8em;
            font-weight: 600;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--brand-slate);
            background: rgba(10, 25, 47, 0.4);
        }

        .role-pill.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--brand-gold);
            border-color: var(--brand-gold);
        }

        /* --- Form Styling --- */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
            position: relative;
        }

        .form-group label {
            font-size: 0.78em;
            font-weight: 600;
            color: var(--brand-light-slate);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 35px;
            color: var(--brand-gold);
        }

        .form-group input {
            background: rgba(6, 12, 24, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 15px 10px 42px;
            color: var(--brand-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9em;
            transition: all 0.3s;
            width: 100%;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--brand-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }

        .btn-submit {
            background: var(--brand-gold);
            color: var(--brand-navy);
            border: none;
            padding: 11px 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.92em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
        }

        .btn-submit:hover {
            background: var(--brand-gold-hover);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-1px);
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85em;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        /* --- Social Logins --- */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--brand-slate);
            font-size: 0.8em;
            margin: 14px 0;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-social {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--brand-white);
            padding: 10px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-social:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--brand-gold);
        }

        .btn-google i {
            color: #ea4335;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 0.85em;
            color: var(--brand-light-slate);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--brand-gold);
        }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="login-card">
        <div class="logo-section" onclick="location.href='index.html'">
            <h1 class="brand-logo">Stitch 'N Style Kenya</h1>
            <span class="brand-sub">Unified Access Portal</span>
        </div>

        <div class="tabs-header">
            <button class="tab-btn active" id="tab-signin-btn" onclick="setMode('signin')">Sign In</button>
            <button class="tab-btn" id="tab-signup-btn" onclick="setMode('signup')">Sign Up</button>
        </div>

        <!-- 🔓 SIGN IN FORM -->
        <div class="tab-content active" id="signin-pane">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit" id="login-button">Sign In to Account</button>
                <p id="auth-message" class="error-message"></p>
            </form>
            
            <div class="divider">Or Continue With</div>
            <div class="social-buttons">
                <button class="btn-social btn-google" onclick="handleSocialLogin('google', 'client')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px; vertical-align: middle;">
                        <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7v2.25h2.9c1.69-1.55 2.69-3.85 2.69-6.58z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.9-2.25c-.8.54-1.84.87-3.06.87-2.35 0-4.34-1.58-5.05-3.72H.92v2.32C2.4 16.03 5.48 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.95 10.7c-.18-.54-.28-1.12-.28-1.7s.1-1.16.28-1.7V4.98H.92C.33 6.18 0 7.55 0 9s.33 2.82.92 4.02l3.03-2.32z"/>
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.4C13.47.97 11.43 0 9 0 5.48 0 2.4 1.97.92 4.98l3.03 2.32C4.66 5.16 6.65 3.58 9 3.58z"/>
                    </svg> Google Login
                </button>
            </div>
        </div>

        <!-- 📝 SIGN UP FORM -->
        <div class="tab-content" id="signup-pane">
            <div class="role-pills">
                <div class="role-pill active" id="pill-client" onclick="setSignupRole('client')">Client Account</div>
                <div class="role-pill" id="pill-tailor" onclick="setSignupRole('tailor')">Register Tailor Shop</div>
            </div>

            <!-- Client Signup Form -->
            <form id="client-signup-form" onsubmit="handleClientSignUp(event)">
                <div class="form-group">
                    <label for="client-name">Your Full Name</label>
                    <i class="fas fa-user"></i>
                    <input type="text" id="client-name" placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label for="client-email">Email Address</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="client-email" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="client-password">Create Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="client-password" placeholder="Min. 6 characters">
                </div>
                <button type="submit" class="btn-submit" id="btn-client-submit">Create Client Account</button>
            </form>

            <!-- Tailor Shop Register Form -->
            <form id="tailor-signup-form" onsubmit="handleTailorSignUp(event)" style="display: none;">
                <div class="form-group">
                    <label for="staff-shop-name">Shop / Business Name</label>
                    <i class="fas fa-store"></i>
                    <input type="text" id="staff-shop-name" placeholder="e.g. Elegant Cuts Tailors">
                </div>
                <div class="form-group">
                    <label for="staff-fullname">Owner Full Name</label>
                    <i class="fas fa-user"></i>
                    <input type="text" id="staff-fullname" placeholder="e.g. Jane Ogwang">
                </div>
                <div class="form-group">
                    <label for="tailor-email">Business Email</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="tailor-email" placeholder="shop@example.com">
                </div>
                <div class="form-group">
                    <label for="tailor-password">Create Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="tailor-password" placeholder="Min. 6 characters">
                </div>
                <button type="submit" class="btn-submit" id="btn-tailor-submit">Register Tailor Shop</button>
            </form>

            <div class="divider">Or Continue With</div>
            <div class="social-buttons">
                <button class="btn-social btn-google" onclick="handleSocialLogin('google', 'client')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px; vertical-align: middle;">
                        <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7v2.25h2.9c1.69-1.55 2.69-3.85 2.69-6.58z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.9-2.25c-.8.54-1.84.87-3.06.87-2.35 0-4.34-1.58-5.05-3.72H.92v2.32C2.4 16.03 5.48 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.95 10.7c-.18-.54-.28-1.12-.28-1.7s.1-1.16.28-1.7V4.98H.92C.33 6.18 0 7.55 0 9s.33 2.82.92 4.02l3.03-2.32z"/>
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.4C13.47.97 11.43 0 9 0 5.48 0 2.4 1.97.92 4.98l3.03 2.32C4.66 5.16 6.65 3.58 9 3.58z"/>
                    </svg> Google Sign Up
                </button>
            </div>

            <p id="signup-message" class="error-message"></p>
        </div>

        <a href="./index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home / Marketplace</a>
    </div>

    <script src="js/core/config.js?v=1781434537375"></script>
    
    <!-- Core & Utils -->
    <script src="js/utils/helpers.js?v=1781434537375"></script>
    <script src="js/ui/theme.js?v=1781434537375"></script>
    <script src="js/core/globals.js?v=1781434537375"></script>
    <script src="js/core/init.js?v=1781434537375"></script>
    <script src="js/core/auth.js?v=1781434537375"></script>
    <script src="js/ui/sidebar.js?v=1781434537375"></script>
    <script src="js/ui/modals.js?v=1781434537375"></script>
    <script src="js/features/inventory.js?v=1781434537375"></script>
    <script src="js/features/clients.js?v=1781434537375"></script>
    
    <script src="js/features/orders.js?v=1781434537375"></script>
    <script src="js/features/payments.js?v=1781434537375"></script>
    <script src="js/features/analytics.js?v=1781434537375"></script>
    <script src="js/features/messaging.js?v=1781434537375"></script>
    <script src="js/features/management.js?v=1781434537375"></script>
    <script src="app.js?v=1781434537375"></script>
    <script>
        let currentMode = 'signin';
        let currentSignupRole = 'client';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-signin-btn').classList.toggle('active', mode === 'signin');
            document.getElementById('tab-signup-btn').classList.toggle('active', mode === 'signup');

            document.getElementById('signin-pane').classList.toggle('active', mode === 'signin');
            document.getElementById('signup-pane').classList.toggle('active', mode === 'signup');
            
            // Clear message elements
            document.getElementById('auth-message').style.display = 'none';
            document.getElementById('signup-message').style.display = 'none';
        }

        function setSignupRole(role) {
            currentSignupRole = role;
            document.getElementById('pill-client').classList.toggle('active', role === 'client');
            document.getElementById('pill-tailor').classList.toggle('active', role === 'tailor');

            document.getElementById('client-signup-form').style.display = role === 'client' ? 'block' : 'none';
            document.getElementById('tailor-signup-form').style.display = role === 'tailor' ? 'block' : 'none';

            // Set validation requirements
            document.getElementById('client-name').required = (role === 'client');
            document.getElementById('client-email').required = (role === 'client');
            document.getElementById('client-password').required = (role === 'client');

            document.getElementById('staff-shop-name').required = (role === 'tailor');
            document.getElementById('staff-fullname').required = (role === 'tailor');
            document.getElementById('tailor-email').required = (role === 'tailor');
            document.getElementById('tailor-password').required = (role === 'tailor');

            document.getElementById('signup-message').style.display = 'none';
        }

        // Auto-detect mode on load (e.g. ?mode=signup or ?role=tailor)
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            const role = params.get('role');

            if (mode === 'signup' || params.get('tab') === 'signup') {
                setMode('signup');
            }
            if (role === 'tailor' || params.get('tab') === 'tailor') {
                setSignupRole('tailor');
            }
        });

        // Lazy load admin client with service role privileges
        function getAdminClient() {
            return window.supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.serviceRoleKey, {
                auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
            });
        }

        // Handle Client Sign Up
        async function handleClientSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('client-name').value.trim();
            const email = document.getElementById('client-email').value.trim();
            const password = document.getElementById('client-password').value;
            const btn = document.getElementById('btn-client-submit');
            const messageEl = document.getElementById('signup-message');

            messageEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                // 0. Check if email already has a profile to prevent duplicate signup
                const { data: existingProfile } = await supabaseClient
                    .from('user_profiles')
                    .select('id, role')
                    .eq('email', email)
                    .maybeSingle();

                if (existingProfile) {
                    throw new Error("This email is already registered. Please go to the Sign In tab to log in.");
                }

                // 1. Supabase Auth Signup
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: name
                        }
                    }
                });

                if (error) throw error;
                if (!data.user) throw new Error("Could not complete registration.");

                // 2. Insert Client Profile record
                const { error: profileError } = await supabaseClient.from('user_profiles').insert([{
                    id: data.user.id,
                    full_name: name,
                    role: 'client',
                    email: email,
                    organization_id: null,
                    shop_id: null
                }]);

                if (profileError) {
                    console.error("Could not write profile record:", profileError);
                }

                alert("Client Account created successfully! Redirecting to marketplace...");
                location.href = '/views/client/client-dashboard.html';
            } catch (err) {
                console.error("Client Signup Error:", err);
                messageEl.textContent = "❌ " + err.message;
                messageEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Client Account';
            }
        }

        // Handle Tailor Shop Register / Sign Up
        async function handleTailorSignUp(e) {
            e.preventDefault();
            const shopName = document.getElementById('staff-shop-name').value.trim();
            const fullName = document.getElementById('staff-fullname').value.trim();
            const email = document.getElementById('tailor-email').value.trim();
            const password = document.getElementById('tailor-password').value;
            const btn = document.getElementById('btn-tailor-submit');
            const messageEl = document.getElementById('signup-message');

            messageEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Registering Shop...';

            try {
                // 0. Check if email already has a profile to prevent duplicate signup
                const { data: existingProfile } = await supabaseClient
                    .from('user_profiles')
                    .select('id, role')
                    .eq('email', email)
                    .maybeSingle();

                if (existingProfile) {
                    throw new Error("This email is already registered. If you already have a customer account, please Sign In and click 'Open a Tailor Shop' under Settings to upgrade.");
                }

                // 1. Sign up auth user in Supabase
                const { data, error: signupError } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });

                if (signupError) throw signupError;
                if (!data.user) throw new Error("Could not complete user registration.");

                const adminClient = getAdminClient();

                // 2. Insert Organization
                const { data: orgData, error: orgError } = await adminClient
                    .from('organizations')
                    .insert([{ name: shopName }])
                    .select()
                    .single();

                if (orgError) throw orgError;

                // 3. Insert Shop
                const { data: shopData, error: shopError } = await adminClient
                    .from('shops')
                    .insert([{ organization_id: orgData.id, name: shopName }])
                    .select()
                    .single();

                if (shopError) throw shopError;

                // 4. Insert Profile with status 'Pending'
                const { error: profileError } = await adminClient
                    .from('user_profiles')
                    .insert([{
                        id: data.user.id,
                        organization_id: orgData.id,
                        shop_id: shopData.id,
                        full_name: fullName,
                        role: 'owner',
                        status: 'Pending',
                        email: email
                    }]);

                if (profileError) throw profileError;

                alert("Shop registered successfully! Awaiting administrator approval.");
                window.location.href = '/views/admin/admin-dashboard.html';
            } catch (err) {
                console.error("Tailor Signup Error:", err);
                messageEl.textContent = "❌ " + err.message;
                messageEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Register Shop';
            }
        }

        // Handle Google / Facebook OAuth logins
        async function handleSocialLogin(provider, role = 'client') {
            try {
                const redirectUrl = window.location.origin + '/login.html';
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: redirectUrl
                    }
                });
                if (error) throw error;
            } catch (err) {
                alert(`OAuth ${provider} failed: ` + err.message);
            }
        }
    </script>
</body>
</html>
