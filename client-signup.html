<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Account | Tailors.co.ke</title>
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --brand-navy: #0a192f;
            --brand-navy-light: #112240;
            --brand-gold: #D4AF37;
            --brand-gold-hover: #f39c12;
            --brand-white: #ffffff;
            --brand-slate: #8892b0;
            --brand-light-slate: #a8b2d1;
            --bg-dark: #060c18;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--brand-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 80px; /* Spacer for fixed header */
            overflow: hidden; /* Prevent body scroll if content fits */
        }

        /* Gold particle background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(6, 12, 24, 0.95);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo-group { cursor: pointer; }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.3em;
            color: var(--brand-gold);
            letter-spacing: 1px;
            display: block;
        }
        .logo-sub {
            font-size: 0.55em;
            letter-spacing: 3px;
            color: var(--brand-white);
            text-transform: uppercase;
            font-weight: 500;
        }

        .back-link {
            color: var(--brand-light-slate);
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 500;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--brand-gold); }

        .auth-card {
            background: rgba(17, 34, 64, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 30px 35px;
            width: 100%;
            max-width: 440px;
            margin: 0 auto; /* Removed heavy vertical margins */
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
        }

        .card-icon {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, var(--brand-gold), var(--brand-gold-hover));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            color: var(--brand-navy);
            margin: 0 auto 12px;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6em;
            font-weight: 700;
            text-align: center;
            color: var(--brand-white);
            margin-bottom: 4px;
        }

        .card-subtitle {
            text-align: center;
            color: var(--brand-slate);
            font-size: 0.82em;
            margin-bottom: 20px;
        }

        /* Tab switcher */
        .mode-tabs {
            display: flex;
            background: rgba(6, 12, 24, 0.5);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 18px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .mode-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 0.85em;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: var(--brand-slate);
            transition: all 0.3s;
            user-select: none;
        }

        .mode-tab.active {
            background: var(--brand-gold);
            color: var(--brand-navy);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.82em;
            font-weight: 600;
            color: var(--brand-light-slate);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(6, 12, 24, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: var(--brand-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95em;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--brand-gold);
            background: rgba(6, 12, 24, 0.8);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-group input::placeholder { color: var(--brand-slate); }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--brand-gold), var(--brand-gold-hover));
            color: var(--brand-navy);
            border: none;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.35);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message-box {
            display: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.88em;
            margin-top: 16px;
            text-align: center;
            line-height: 1.5;
        }

        .message-box.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message-box.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .divider {
            text-align: center;
            color: var(--brand-slate);
            font-size: 0.8em;
            margin: 12px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: rgba(212, 175, 55, 0.15);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-google {
            width: 100%;
            padding: 11px;
            background: white;
            color: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        .btn-google:hover {
            background: #f9fafb;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.15);
        }
        .btn-google img { width: 18px; height: 18px; }

        .name-field { display: none; }
        .name-field.visible { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo-group" onclick="location.href='index.html'">
            <span class="logo-text">Tailors.co.ke</span>
            <span class="logo-sub">Find Your Perfect Fit</span>
        </div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Marketplace</a>
    </header>

    <div class="auth-card">
        <div class="card-icon">
            <i class="fas fa-user"></i>
        </div>
        <h1 class="card-title">Client Account</h1>
        <p class="card-subtitle">Browse tailors, send inquiries & track your orders</p>

        <button type="button" class="btn-google" id="btn-google" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Continue with Google
        </button>
        <div class="divider">or</div>

        <div class="mode-tabs">
            <div class="mode-tab active" id="tab-signin" onclick="switchMode('signin')">
                <i class="fas fa-sign-in-alt"></i> Log In
            </div>
            <div class="mode-tab" id="tab-signup" onclick="switchMode('signup')">
                <i class="fas fa-user-plus"></i> Sign Up
            </div>
        </div>

        <form id="client-form" onsubmit="handleSubmit(event)">
            <div class="form-group name-field" id="name-field">
                <label>Full Name</label>
                <input type="text" id="input-name" placeholder="e.g. Jane Wanjiku" autocomplete="name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="input-email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="input-password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
                <i class="fas fa-sign-in-alt"></i> Log In
            </button>
        </form>

        <div class="message-box" id="message-box"></div>
    </div>

    <script src="config.js"></script>
    <script>
        // ─── This page is CLIENT-ONLY. It does NOT import app.js. ───
        // No staff routing, no checkSession, no redirects to admin dashboards.

        let supabaseClient;
        let currentMode = 'signin';

        // Read URL param to auto-switch mode
        const urlParams = new URLSearchParams(window.location.search);
        const modeParam = urlParams.get('mode') || urlParams.get('tab');
        if (modeParam === 'signup') {
            currentMode = 'signup';
        }

        function executeRedirect() {
            window.location.href = 'client-dashboard.html';
        }

        // Init Supabase
        if (typeof APP_CONFIG !== 'undefined' && window.supabase) {
            supabaseClient = window.supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);
            const oauthParam = new URLSearchParams(window.location.search).get('oauth');
            if (oauthParam === 'callback') {
                document.addEventListener('DOMContentLoaded', handleOAuthCallback);
            } else {
                checkIfAlreadyLoggedIn();
            }
        }

        async function handleGoogleLogin() {
            if (!supabaseClient) return;
            const btn = document.getElementById('btn-google');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting to Google...';
            }
            
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/client-signup.html?oauth=callback'
                }
            });
            if (error) {
                showMessage('error', '❌ Google sign-in failed: ' + error.message);
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google';
                }
            }
        }

        async function handleOAuthCallback() {
            try {
                showMessage('success', '<i class="fas fa-spinner fa-spin"></i> Finalizing Google sign-in...');
                
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                if (error) throw error;
                if (!session) {
                    showMessage('error', '❌ No active session found.');
                    return;
                }
                
                const user = session.user;
                
                // Check if profile exists
                const { data: profile, error: profileErr } = await supabaseClient
                    .from('user_profiles')
                    .select('role')
                    .eq('id', user.id)
                    .maybeSingle();
                
                if (profileErr) throw profileErr;
                
                if (!profile) {
                    // New Google user — create client profile
                    const name = user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'Client';
                    const { error: insertErr } = await supabaseClient.from('user_profiles').insert([{
                        id: user.id,
                        full_name: name,
                        role: 'client',
                        email: user.email,
                        organization_id: null,
                        shop_id: null
                    }]);
                    if (insertErr) throw insertErr;
                    
                    showMessage('success', '✅ Google account connected! Redirecting...');
                    setTimeout(() => { executeRedirect(); }, 1200);
                } else if (profile.role === 'client') {
                    showMessage('success', '✅ Welcome back! Redirecting...');
                    setTimeout(() => { executeRedirect(); }, 1200);
                } else {
                    // Staff member used Google login on client page — block
                    await supabaseClient.auth.signOut();
                    showMessage('error', '⚠️ This login is for clients only. Staff members should use the staff portal.');
                }
            } catch (err) {
                showMessage('error', '❌ Google authentication failed: ' + (err.message || err));
            }
        }

        // Apply initial mode
        document.addEventListener('DOMContentLoaded', () => {
            applyMode(currentMode);
        });

        function switchMode(mode) {
            currentMode = mode;
            applyMode(mode);
            hideMessage();
        }

        function applyMode(mode) {
            const nameField = document.getElementById('name-field');
            const nameInput = document.getElementById('input-name');
            const btn = document.getElementById('btn-submit');
            const tabSignin = document.getElementById('tab-signin');
            const tabSignup = document.getElementById('tab-signup');
            const pwdInput = document.getElementById('input-password');

            if (mode === 'signup') {
                nameField.classList.add('visible');
                nameInput.required = true;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                tabSignin.classList.remove('active');
                tabSignup.classList.add('active');
                pwdInput.setAttribute('autocomplete', 'new-password');
            } else {
                nameField.classList.remove('visible');
                nameInput.required = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
                tabSignin.classList.add('active');
                tabSignup.classList.remove('active');
                pwdInput.setAttribute('autocomplete', 'current-password');
            }
        }

        async function checkIfAlreadyLoggedIn() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) return;

                // User is already logged in — check their role
                const { data: profile } = await supabaseClient
                    .from('user_profiles')
                    .select('role')
                    .eq('id', user.id)
                    .single();

                const role = profile?.role;

                if (role === 'client') {
                    // Client already logged in → send back to marketplace / previous page
                    executeRedirect();
                } else if (role) {
                    // Staff member browsing the marketplace → send back to marketplace
                    window.location.href = 'index.html';
                }
            } catch (e) {
                // Not logged in or error — stay on page, that's fine
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            if (!supabaseClient) {
                showMessage('error', 'Connection error. Please refresh the page.');
                return;
            }

            const email = document.getElementById('input-email').value.trim();
            const password = document.getElementById('input-password').value;
            const name = document.getElementById('input-name').value.trim();
            const btn = document.getElementById('btn-submit');

            btn.disabled = true;
            btn.innerHTML = currentMode === 'signup'
                ? '<i class="fas fa-spinner fa-spin"></i> Creating Account...'
                : '<i class="fas fa-spinner fa-spin"></i> Logging In...';
            hideMessage();

            try {
                if (currentMode === 'signup') {
                    if (!name) {
                        showMessage('error', 'Please enter your full name.');
                        return;
                    }

                    const { data, error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: { data: { full_name: name } }
                    });

                    if (error) throw error;
                    if (!data.user) throw new Error('Could not complete registration. Please try again.');

                    // Insert client profile
                    await supabaseClient.from('user_profiles').insert([{
                        id: data.user.id,
                        full_name: name,
                        role: 'client',
                        email: email,
                        organization_id: null,
                        shop_id: null
                    }]);

                    showMessage('success', '✅ Account created! Redirecting to client portal...');
                    setTimeout(() => { executeRedirect(); }, 1800);

                } else {
                    // Sign in
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    // Verify they are a client (not staff trying to use client login)
                    const { data: profile } = await supabaseClient
                        .from('user_profiles')
                        .select('role, full_name')
                        .eq('id', data.user.id)
                        .single();

                    const role = profile?.role;

                    if (role && role !== 'client') {
                        // Staff member used client login — sign them out, redirect to staff portal
                        await supabaseClient.auth.signOut();
                        showMessage('error', '⚠️ This login is for clients only. Staff members should use the staff portal directly.');
                        return;
                    }

                    // Valid client login
                    showMessage('success', '✅ Welcome back! Redirecting...');
                    setTimeout(() => { executeRedirect(); }, 1200);
                }

            } catch (err) {
                const msg = err.message || 'Something went wrong. Please try again.';
                // Make common errors friendlier
                if (msg.includes('Invalid login credentials')) {
                    showMessage('error', '❌ Wrong email or password. Please try again.');
                } else if (msg.includes('User already registered')) {
                    showMessage('error', '⚠️ An account with this email already exists. Try logging in instead.');
                    switchMode('signin');
                } else if (msg.includes('Password should be')) {
                    showMessage('error', '❌ Password must be at least 6 characters.');
                } else {
                    showMessage('error', '❌ ' + msg);
                }
            } finally {
                btn.disabled = false;
                applyMode(currentMode); // Restore button text
            }
        }

        function showMessage(type, text) {
            const box = document.getElementById('message-box');
            box.className = 'message-box ' + type;
            box.innerHTML = text;
            box.style.display = 'block';
        }

        function hideMessage() {
            const box = document.getElementById('message-box');
            box.style.display = 'none';
        }
    </script>
</body>
</html>
