<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creations & Tailors Marketplace | Ephraims Bespoke</title>
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --brand-navy: #0a192f;
            --brand-navy-light: #112240;
            --brand-gold: #D4AF37;
            --brand-gold-hover: #f39c12;
            --brand-gold-light: #f4e5bc;
            --brand-white: #ffffff;
            --brand-slate: #8892b0;
            --brand-light-slate: #a8b2d1;
            --bg-dark: #060c18;
            --card-bg: rgba(17, 34, 64, 0.55);
            --glass-border: rgba(212, 175, 55, 0.15);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--brand-white);
            line-height: 1.6;
            background-image: radial-gradient(circle at 50% 50%, rgba(10, 25, 47, 0.8) 0%, transparent 100%),
                              radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== NAVIGATION HEADER ===== */
        header {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .logo-group img {
            height: 40px;
            width: auto;
            border-radius: 4px;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.4em;
            color: var(--brand-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .brand-sub {
            font-size: 0.55em;
            letter-spacing: 3px;
            color: var(--brand-white);
            display: block;
            margin-top: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        nav a {
            color: var(--brand-light-slate);
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        nav a:hover {
            color: var(--brand-gold);
        }

        .nav-auth-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-login {
            color: var(--brand-white);
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 6px;
            transition: var(--transition-smooth);
        }

        .btn-login:hover {
            color: var(--brand-gold);
        }

        .btn-signup {
            background: transparent;
            border: 1px solid var(--brand-gold);
            color: var(--brand-gold);
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 6px;
            transition: var(--transition-smooth);
        }

        .btn-signup:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-1px);
        }

        .nav-user-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 12px;
            border-radius: 30px;
        }

        .nav-user-name {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--brand-gold-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-portal {
            background: var(--brand-gold);
            color: var(--brand-navy);
            border: none;
            font-size: 0.8em;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-portal:hover {
            background: var(--brand-gold-hover);
        }

        .btn-signout {
            background: transparent;
            border: none;
            color: #ef4444;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-left: 5px;
        }

        .btn-signout:hover {
            color: #f87171;
            text-decoration: underline;
        }

        /* ===== MAIN MARKETPLACE AREA ===== */
        main {
            flex: 1;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .marketplace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 20px;
        }

        .header-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: var(--brand-white);
            margin-bottom: 6px;
        }

        .header-title p {
            font-size: 0.9em;
            color: var(--brand-slate);
        }

        /* Search Bar & Filters */
        .search-container {
            background: rgba(17, 34, 64, 0.6);
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 750px;
        }

        .search-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 160px;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding-right: 10px;
        }

        .search-group:last-child {
            border-right: none;
            padding-right: 0;
        }

        .search-group i {
            color: var(--brand-gold);
            font-size: 0.9em;
        }

        .search-group input, .search-group select {
            background: transparent;
            border: none;
            color: var(--brand-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85em;
            outline: none;
            width: 100%;
        }

        .search-group select {
            cursor: pointer;
        }

        .search-group select option, .search-group select optgroup {
            background-color: var(--brand-navy-light);
            color: var(--brand-white);
        }

        /* Toggle Buttons */
        .toggle-container {
            display: flex;
            background: rgba(17, 34, 64, 0.4);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: fit-content;
            margin-bottom: 30px;
            gap: 5px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--brand-slate);
            padding: 8px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active {
            background: var(--brand-gold);
            color: var(--brand-navy);
        }

        /* Grid Layouts */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Card Styles */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-banner-wrap {
            height: 180px;
            overflow: hidden;
            position: relative;
            background: #0d1e3d;
        }

        .card-banner-blur {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            opacity: 0.4;
        }

        .card-banner {
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 1;
            transition: transform 0.5s ease;
        }

        .card:hover .card-banner {
            transform: scale(1.05);
        }

        /* Premium Listing Card Image Overrides (prevent cropping) */
        .listing-card .card-banner-wrap {
            height: 240px;
            position: relative;
            background-color: #060c18;
        }

        .listing-card .card-banner-blur {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.5);
            opacity: 0.65;
            z-index: 1;
        }

        .listing-card .card-banner {
            position: relative;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            z-index: 2;
            height: 100%;
        }

        .card-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--bg-dark);
            background: var(--brand-navy);
            position: absolute;
            top: 145px;
            left: 20px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            color: var(--brand-gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-size: cover;
            background-position: center;
        }

        .card-body {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* For shop card spacing */
        .shop-card .card-body {
            padding-top: 45px;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            color: var(--brand-white);
            margin-bottom: 8px;
        }

        .card-location {
            font-size: 0.82em;
            color: var(--brand-slate);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-desc {
            font-size: 0.88em;
            color: var(--brand-light-slate);
            margin-bottom: 20px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            margin-top: auto;
        }

        .card-badge {
            font-size: 0.72em;
            font-weight: 700;
            background: rgba(212, 175, 55, 0.15);
            color: var(--brand-gold);
            padding: 4px 10px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-tag {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--brand-gold);
        }

        .card-btn {
            background: transparent;
            border: 1px solid var(--brand-gold);
            color: var(--brand-gold);
            font-size: 0.82em;
            font-weight: 700;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-btn:hover {
            background: var(--brand-gold);
            color: var(--brand-navy);
        }

        /* ===== FOOTER ===== */
        footer {
            background: #030712;
            padding: 40px 5% 20px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            margin-top: auto;
        }

        footer p {
            color: var(--brand-slate);
            font-size: 0.85em;
        }

        /* ===== LOADER ===== */
        .loader-container {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 0;
            color: var(--brand-slate);
        }

        .loader-spinner {
            font-size: 2.5em;
            color: var(--brand-gold);
            margin-bottom: 15px;
            animation: fa-spin 1.5s infinite linear;
        }
    </style>
</head>

<body>

    <!-- ===== NAVIGATION HEADER ===== -->
    <header>
        <a href="index.html" class="logo-group">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
            <div>
                <h1 class="brand-logo" id="brand-logo-text">EPHRAIMS BESPOKE</h1>
                <span class="brand-sub" id="brand-sub-text">BY RONNY</span>
            </div>
        </a>

        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="marketplace.html" style="color: var(--brand-gold);"><i class="fas fa-shopping-bag"></i> Marketplace</a>
            <div class="nav-auth-buttons" id="nav-auth-area">
                <i class="fas fa-spinner fa-spin" style="color: var(--brand-gold);"></i>
            </div>
        </nav>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        <div class="marketplace-header">
            <div class="header-title">
                <h2>Bespoke Marketplace</h2>
                <p>Browse directories, discover custom designs, and hire expert tailors.</p>
            </div>

            <!-- Dynamic Search Container -->
            <div class="search-container">
                <div class="search-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="mkt-search-query" placeholder="Search creations..." onkeyup="filterMarketplace()">
                </div>
                <div class="search-group">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="mkt-search-location" placeholder="City / Location..." onkeyup="filterMarketplace()">
                </div>
                <div class="search-group">
                    <i class="fas fa-tags"></i>
                    <select id="mkt-category-filter" onchange="filterMarketplace()">
                        <option value="">All Categories</option>
                        <optgroup label="— Tailored Clothing —">
                            <option value="Suits">Suits</option>
                            <option value="Senator Wear">Senator Wear</option>
                            <option value="Dresses">Dresses</option>
                            <option value="Shirts">Shirts</option>
                            <option value="Trousers">Trousers</option>
                            <option value="Coats">Coats</option>
                            <option value="Alterations">Alterations</option>
                        </optgroup>
                        <optgroup label="— Ready-made Clothing —">
                            <option value="Jumpsuits &amp; Rompers">Jumpsuits &amp; Rompers</option>
                            <option value="Hoodies &amp; Sweatshirts">Hoodies &amp; Sweatshirts</option>
                            <option value="T-Shirts &amp; Polos">T-Shirts &amp; Polos</option>
                            <option value="Jeans &amp; Denim">Jeans &amp; Denim</option>
                            <option value="Jackets &amp; Cardigans">Jackets &amp; Cardigans</option>
                            <option value="Ready-to-Wear Dresses">Ready-to-Wear Dresses</option>
                            <option value="Activewear">Activewear</option>
                        </optgroup>
                        <optgroup label="— Accessories —">
                            <option value="Watches">Watches</option>
                            <option value="Glasses &amp; Shades">Glasses &amp; Shades</option>
                            <option value="Ties &amp; Bowties">Ties &amp; Bowties</option>
                            <option value="Scarves &amp; Capes">Scarves &amp; Capes</option>
                            <option value="Belts">Belts</option>
                            <option value="Hats &amp; Caps">Hats &amp; Caps</option>
                            <option value="Bags &amp; Clutches">Bags &amp; Clutches</option>
                            <option value="Jewellery">Jewellery</option>
                        </optgroup>
                        <optgroup label="— Footwear —">
                            <option value="Shoes">Shoes</option>
                            <option value="Sandals &amp; Slippers">Sandals &amp; Slippers</option>
                            <option value="Boots">Boots</option>
                        </optgroup>
                    </select>
                </div>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="toggle-container">
            <button class="toggle-btn active" id="btn-mode-listings" onclick="setMarketplaceMode('listings')">
                <i class="fas fa-cut"></i> Creations &amp; Designs
            </button>
            <button class="toggle-btn" id="btn-mode-shops" onclick="setMarketplaceMode('shops')">
                <i class="fas fa-store"></i> Tailoring Shops
            </button>
        </div>

        <!-- Creations (Listings) Grid -->
        <div class="content-grid" id="listings-grid">
            <div class="loader-container">
                <i class="fas fa-spinner loader-spinner"></i>
                <p>Loading marketplace creations...</p>
            </div>
        </div>

        <!-- Shops Grid -->
        <div class="content-grid" id="shops-grid" style="display: none;">
            <div class="loader-container">
                <i class="fas fa-spinner loader-spinner"></i>
                <p>Loading tailoring shops...</p>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>&copy; 2026 Ephraims Bespoke. All Rights Reserved.</p>
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script src="config.js"></script>
    <script>
        let supabaseClient;
        let allShops = [];
        let allListings = [];
        let allReviews = [];
        let activeMode = 'listings'; // 'listings' or 'shops'

        // Apply config branding dynamically
        if (typeof APP_CONFIG !== 'undefined') {
            document.getElementById('brand-logo-text').textContent = APP_CONFIG.appName || 'EPHRAIMS BESPOKE';
            document.getElementById('brand-sub-text').textContent = APP_CONFIG.appSubtitle || 'BY RONNY';
            if (APP_CONFIG.logoPath) {
                const logoImg = document.querySelector('.logo-group img');
                if (logoImg) logoImg.src = APP_CONFIG.logoPath;
            }
        }

        // Initialize Supabase
        if (typeof window.supabase !== 'undefined' && typeof APP_CONFIG !== 'undefined') {
            supabaseClient = window.supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);
            checkSession();
            loadMarketplace();
        }

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g,
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Auth Header Controller
        async function checkSession() {
            const authArea = document.getElementById('nav-auth-area');
            if (!authArea || !supabaseClient) return;

            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    authArea.innerHTML = `
                        <a href="login.html" class="btn-login"><i class="fas fa-sign-in-alt"></i> Log In</a>
                        <a href="login.html?mode=signup" class="btn-signup"><i class="fas fa-user-plus"></i> Sign Up</a>`;
                    return;
                }

                const { data: profile } = await supabaseClient
                    .from('user_profiles')
                    .select('role, full_name')
                    .eq('id', user.id)
                    .single();

                const role = profile?.role || 'client';
                const name = profile?.full_name || user.user_metadata?.full_name || 'Account';
                const firstName = name.split(' ')[0];

                if (role === 'client') {
                    authArea.innerHTML = `
                        <div class="nav-user-pill">
                            <span class="nav-user-name"><i class="fas fa-user-circle"></i> ${escapeHTML(firstName)}</span>
                            <a href="client-dashboard.html" class="btn-portal"><i class="fas fa-comments"></i> My Inbox</a>
                            <button class="btn-signout" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
                        </div>`;
                } else {
                    const dashUrl = role === 'superadmin' ? 'superadmin-dashboard.html'
                        : role === 'owner' ? 'admin-dashboard.html'
                            : 'manager-dashboard.html';
                    authArea.innerHTML = `
                        <div class="nav-user-pill">
                            <span class="nav-user-name"><i class="fas fa-user-tie"></i> ${escapeHTML(firstName)}</span>
                            <a href="${dashUrl}" class="btn-portal"><i class="fas fa-th-large"></i> Dashboard</a>
                            <button class="btn-signout" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
                        </div>`;
                }
            } catch (err) {
                console.warn('Session verification failed:', err);
                authArea.innerHTML = `
                    <a href="login.html" class="btn-login"><i class="fas fa-sign-in-alt"></i> Log In</a>
                    <a href="login.html?mode=signup" class="btn-signup"><i class="fas fa-user-plus"></i> Sign Up</a>`;
            }
        }

        async function signOut() {
            if (supabaseClient) {
                await supabaseClient.auth.signOut();
                location.reload();
            }
        }

        // Toggle Active Tab Mode
        function setMarketplaceMode(mode) {
            activeMode = mode;
            const btnListings = document.getElementById('btn-mode-listings');
            const btnShops = document.getElementById('btn-mode-shops');
            const gridListings = document.getElementById('listings-grid');
            const gridShops = document.getElementById('shops-grid');

            if (mode === 'listings') {
                btnListings.classList.add('active');
                btnShops.classList.remove('active');
                gridListings.style.display = 'grid';
                gridShops.style.display = 'none';
            } else {
                btnListings.classList.remove('active');
                btnShops.classList.add('active');
                gridListings.style.display = 'none';
                gridShops.style.display = 'grid';
            }
            filterMarketplace();
        }

        // Fetch Data from Supabase Database
        async function loadMarketplace() {
            try {
                // 1. Fetch public shops
                let { data: shops, error: shopsErr } = await supabaseClient
                    .from('shops')
                    .select('*')
                    .eq('is_public', true);
                allShops = shops || [];

                // 2. Fetch active creations
                let { data: listings, error: listingsErr } = await supabaseClient
                    .from('marketplace_listings')
                    .select('*, shops(name, profile_image)')
                    .eq('status', 'active');
                allListings = listings || [];

                // 3. Fetch reviews
                let { data: reviews } = await supabaseClient
                    .from('vw_marketplace_reviews')
                    .select('*');
                allReviews = reviews || [];

                // Check URL params for category filter trigger
                const urlParams = new URLSearchParams(window.location.search);
                const catParam = urlParams.get('category');
                if (catParam) {
                    const select = document.getElementById('mkt-category-filter');
                    if (select) {
                        select.value = catParam;
                    }
                }
                const tabParam = urlParams.get('tab');
                if (tabParam === 'shops') {
                    setMarketplaceMode('shops');
                } else {
                    renderShops(allShops);
                    renderListings(allListings);
                    filterMarketplace();
                }

            } catch (err) {
                console.error("Marketplace fetch error:", err);
                document.getElementById('listings-grid').innerHTML = `<p style="color:red;grid-column:1/-1;text-align:center;">Failed to connect to database.</p>`;
            }
        }

        // Render Tailors Grid
        function renderShops(shops) {
            const container = document.getElementById('shops-grid');
            if (!container) return;
            if (shops.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--brand-slate);">No tailoring shops found.</div>`;
                return;
            }

            const STORAGE_URL = `${APP_CONFIG.supabaseUrl}/storage/v1/object/public/marketplace-assets/`;
            container.innerHTML = shops.map(shop => {
                const hasBanner = shop.banner_image && shop.banner_image.trim() !== '' && !shop.banner_image.endsWith('/');
                const bannerUrl = hasBanner ? (shop.banner_image.startsWith('http') ? shop.banner_image : STORAGE_URL + shop.banner_image) : null;
                const bannerStyle = bannerUrl ? `background-image: url('${bannerUrl}')` : `background: linear-gradient(135deg, var(--brand-navy) 0%, var(--brand-navy-light) 100%); border-bottom: 1px solid rgba(212,175,55,0.15);`;
                
                const avatarUrl = shop.profile_image ? (shop.profile_image.startsWith('http') ? shop.profile_image : STORAGE_URL + shop.profile_image) : '';
                const avatarStyle = avatarUrl ? `background-image: url('${avatarUrl}'); border-color: var(--brand-gold);` : '';

                const rawLoc = shop.location_name || shop.location || 'Nairobi, Kenya';
                const formattedLoc = rawLoc.split(',').map(s => s.trim().replace(/\b\w/g, c => c.toUpperCase())).join(', ');

                const shopReviews = allReviews.filter(r => r.shop_id === shop.id);
                const avgRating = shopReviews.length > 0
                    ? (shopReviews.reduce((sum, r) => sum + r.rating, 0) / shopReviews.length).toFixed(1)
                    : null;
                const ratingBadge = avgRating
                    ? `<span class="card-badge"><i class="fas fa-star" style="color: var(--brand-gold);"></i> ${avgRating} (${shopReviews.length})</span>`
                    : `<span class="card-badge" style="background: rgba(255,255,255,0.05); color: var(--brand-slate);"><i class="far fa-star"></i> New Shop</span>`;

                return `
                    <div class="card shop-card">
                        <div class="card-banner-wrap">
                            <div class="card-banner" style="${bannerStyle}"></div>
                        </div>
                        <div class="card-avatar" style="${avatarStyle}">
                            ${shop.profile_image ? '' : '<i class="fas fa-store"></i>'}
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${escapeHTML(shop.name)}</h3>
                            <div class="card-location">
                                <i class="fas fa-map-marker-alt"></i> ${escapeHTML(formattedLoc)}
                            </div>
                            <p class="card-desc">${escapeHTML(shop.description || 'Bespoke designs and luxury tailoring services.')}</p>
                            <div class="card-footer">
                                ${ratingBadge}
                                <a href="shop.html?id=${shop.id}" class="card-btn">Visit Shop <i class="fas fa-chevron-right"></i></a>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // Render Listings Grid
        function renderListings(listings) {
            const container = document.getElementById('listings-grid');
            if (!container) return;
            if (listings.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--brand-slate);">No designs found.</div>`;
                return;
            }

            container.innerHTML = listings.map(list => {
                const imageUrl = (list.image_urls && JSON.parse(list.image_urls)[0]) || list.image_url || `https://images.unsplash.com/photo-1593032465175-481ac7f401a0?auto=format&fit=crop&q=80&w=400`;
                const shopFromCache = allShops.find(s => s.id === list.shop_id);
                const shopName = list.shops?.name || shopFromCache?.name || 'Style Shop';
                const shopProfileImg = list.shops?.profile_image || shopFromCache?.profile_image;

                const STORAGE_URL = `${APP_CONFIG.supabaseUrl}/storage/v1/object/public/marketplace-assets/`;
                const avatarImgUrl = shopProfileImg ? (shopProfileImg.startsWith('http') ? shopProfileImg : STORAGE_URL + shopProfileImg) : null;
                const avatarIconHtml = avatarImgUrl 
                    ? `<img src="${avatarImgUrl}" style="width:16px; height:16px; border-radius:50%; object-fit:cover; margin-right:6px; border: 1px solid var(--brand-gold); vertical-align: middle;">`
                    : `<i class="fas fa-store" style="color:var(--brand-gold); margin-right:4px; vertical-align: middle;"></i>`;

                const listingReviews = allReviews.filter(r => r.listing_id === list.id);
                const avgRating = listingReviews.length > 0
                    ? (listingReviews.reduce((sum, r) => sum + r.rating, 0) / listingReviews.length).toFixed(1)
                    : null;
                const ratingTag = avgRating
                    ? `<span style="color: var(--brand-gold); font-size: 0.82em; font-weight: 600; display: inline-flex; align-items: center; gap: 4px;"><i class="fas fa-star"></i> ${avgRating} (${listingReviews.length})</span>`
                    : `<span style="color: var(--brand-slate); font-size: 0.8em; font-style: italic;">No reviews</span>`;

                return `
                    <div class="card listing-card">
                        <div class="card-banner-wrap">
                            <div class="card-banner-blur" style="background-image: url('${imageUrl}')"></div>
                            <div class="card-banner" style="background-image: url('${imageUrl}')"></div>
                        </div>
                        <div class="card-body">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px;">
                                <h3 class="card-title" style="font-size:1.15em; margin-bottom: 0; line-height: 1.2;">${escapeHTML(list.title)}</h3>
                                ${ratingTag}
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap: 8px; margin-top: 5px;">
                                <span class="card-badge">${escapeHTML(list.category || 'Senator Wear')}</span>
                                <span style="font-size:0.8em; color:var(--brand-slate); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 140px; display: inline-flex; align-items: center;" title="${escapeHTML(shopName)}">
                                    ${avatarIconHtml}${escapeHTML(shopName)}
                                </span>
                            </div>
                            <p class="card-desc" style="font-size: 0.85em; margin-bottom: 15px;">${escapeHTML(list.description || 'Custom crafted.')}</p>
                            <div class="card-footer">
                                <span class="price-tag">${list.price ? 'Ksh ' + parseFloat(list.price).toLocaleString() : 'Negotiable'}</span>
                                <a href="shop.html?id=${list.shop_id}" class="card-btn">Inquire Now <i class="fas fa-envelope"></i></a>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // Search & Filter Controller
        function filterMarketplace() {
            const query = document.getElementById('mkt-search-query').value.toLowerCase().trim();
            const location = document.getElementById('mkt-search-location').value.toLowerCase().trim();
            const category = document.getElementById('mkt-category-filter').value;

            if (activeMode === 'shops') {
                const filteredShops = allShops.filter(shop => {
                    const nameMatch = !query || 
                        (shop.name && shop.name.toLowerCase().includes(query)) ||
                        (shop.description && shop.description.toLowerCase().includes(query));
                    
                    const locMatch = !location || 
                        (shop.location_name && shop.location_name.toLowerCase().includes(location)) ||
                        (shop.location && shop.location.toLowerCase().includes(location));

                    return nameMatch && locMatch;
                });
                renderShops(filteredShops);
            } else {
                const filteredListings = allListings.filter(list => {
                    const titleMatch = !query || 
                        (list.title && list.title.toLowerCase().includes(query)) ||
                        (list.description && list.description.toLowerCase().includes(query)) ||
                        (list.category && list.category.toLowerCase().includes(query));

                    const categoryMatch = !category || list.category === category;

                    const shop = allShops.find(s => s.id === list.shop_id);
                    const locMatch = !location || (shop && (
                        (shop.location_name && shop.location_name.toLowerCase().includes(location)) ||
                        (shop.location && shop.location.toLowerCase().includes(location))
                    ));

                    return titleMatch && categoryMatch && locMatch;
                });
                renderListings(filteredListings);
            }
        }
    </script>
</body>

</html>
