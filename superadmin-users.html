<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Admin Accounts | SaaS Control</title>
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-logo">SaaS<span class="sidebar-n"> Control</span></h1>
            </div>
            <nav>
                <a href="superadmin-dashboard.html"><i class="fas fa-chart-line" style="margin-right: 8px;"></i> Overview</a>
                <a href="superadmin-orgs.html"><i class="fas fa-building" style="margin-right: 8px;"></i> Organizations</a>
                <a href="superadmin-users.html" class="active"><i class="fas fa-user-shield" style="margin-right: 8px;"></i> Admin Accounts</a>
                <a href="superadmin-users-list.html"><i class="fas fa-users" style="margin-right: 8px;"></i> Platform Users</a>
                <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 30px;">
                <h1 style="color: var(--brand-navy);">Admin User Provisioning</h1>
            </header>

            <section class="order-form-container" style="max-width: 600px; margin-bottom: 40px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <h2 style="margin-top: 0;">Create Tenant Admin (Owner)</h2>
                <form id="create-admin-form">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 700;">Full Name</label>
                        <input type="text" id="admin-fullname" placeholder="John Doe" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 700;">Email Address</label>
                        <input type="email" id="admin-email" placeholder="admin@shop.com" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 700;">Initial Password</label>
                        <input type="password" id="admin-password" placeholder="Min 6 characters" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 700;">Assign to Organization</label>
                        <select id="admin-org-select" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                            <option value="">Select Organization...</option>
                            <!-- Orgs will be loaded by JS -->
                        </select>
                    </div>
                    <button type="submit" class="small-btn" id="create-admin-btn" style="width: 100%; background: var(--brand-navy); color: var(--brand-gold); padding: 12px; font-weight: bold;">
                        <i class="fas fa-user-plus"></i> Create Admin Account
                    </button>
                    <div id="admin-message" style="margin-top: 10px; text-align: center;"></div>
                </form>
            </section>

            <p style="background: #fff8e1; border-left: 4px solid #ffb300; padding: 15px; border-radius: 4px; font-size: 0.9em; color: #856404;">
                <i class="fas fa-info-circle"></i> <strong>Note:</strong> Creating an account here uses the Supabase Admin API. The user will be created and automatically linked to the selected organization with the <strong>Owner</strong> role.
            </p>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
