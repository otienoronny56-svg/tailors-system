<body>
    <script>
        const supabase = window.supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.serviceRoleKey);
        supabase.from('orders').select('id').limit(1).then(({data, error}) => {
             if (error) document.body.innerHTML = "<h1>Error: " + error.message + "</h1>";
             else document.body.innerHTML = "<h1>ORDER_ID:" + data[0].id + "</h1>";
        });
    </script>
</body>
